{"a": "Rage Against the Machine", "t": "Rage Against the Machine", "y": 1992, "g": "Rap Metal", "d": "Tom Morello's guitar sounds like a DJ turntable \u2014 scratches, feedback, whammy-bar dives \u2014 all produced by four humans with no samples or synthesizers. Zack de la Rocha's political fury drew from Marxism, Zapatismo, and Black nationalism. 'Killing in the Name' became a perennial protest anthem, its 'fuck you I won't do what you tell me' refrain chanted at demonstrations worldwide. The album sold three million copies and proved that radical politics could be commercially viable.", "tr": ["Bombtrack", "Killing in the Name", "Take the Power Back", "Settle for Nothing", "Bullet in the Head", "Know Your Enemy", "Wake Up", "Fistful of Steel", "Freedom"], "s": [0, 1, 4, 6]},
{"a": "Weezer", "t": "Pinkerton", "y": 1996, "g": "Alternative Rock", "d": "Rivers Cuomo's confessional follow-up to the Blue Album was abrasive, painfully honest about his insecurities, and deeply unfashionable in 1996. 'Across the Sea' is a love letter to a Japanese fan that's simultaneously creepy and heartbreaking. 'El Scorcho' name-drops Cio-Cio San. Commercially catastrophic \u2014 it destroyed the band's momentum entirely. But over time, fans and critics reversed their opinions so completely that it's now considered the greatest emo-adjacent album ever recorded.", "tr": ["Tired of Sex", "Getchoo", "No Other One", "Why Bother?", "Across the Sea", "The Good Life", "El Scorcho", "Pink Triangle", "Falling for You", "Butterfly"], "s": [4, 5, 6]},
{"a": "Smashing Pumpkins", "t": "Siamese Dream", "y": 1993, "g": "Alternative Rock", "d": "Billy Corgan, paralyzed by anxiety and suicidal ideation, responded by overdubbing nearly every instrument himself \u2014 drummer Jimmy Chamberlin was the only member whose performances survived intact. Producer Butch Vig layered hundreds of guitar tracks into walls of sound. 'Today' \u2014 written about Corgan's worst day alive \u2014 became a joyful anthem through sheer melodic force. 'Disarm' was banned by the BBC for its references to child abuse. 'Mayonaise' is widely considered their masterpiece.", "tr": ["Cherub Rock", "Quiet", "Today", "Hummer", "Rocket", "Disarm", "Soma", "Geek U.S.A.", "Mayonaise", "Spaceboy", "Luna"], "s": [0, 2, 5, 8]},
{"a": "Nine Inch Nails", "t": "The Downward Spiral", "y": 1994, "g": "Industrial", "d": "Recorded at the house where Sharon Tate was murdered by the Manson Family, Trent Reznor crafted a concept album about systematic self-destruction. 'Closer' became an unlikely mainstream hit despite its explicit content. 'A Warm Place' provides moments of fragile beauty amid the industrial assault. 'Hurt' was later transformed by Johnny Cash's devastating cover, which Reznor said made the song feel like it belonged to Cash. Three million copies. Industrial rock's most artistically ambitious statement.", "tr": ["Mr. Self Destruct", "Piggy", "March of the Pigs", "Closer", "Ruiner", "The Becoming", "A Warm Place", "Eraser", "The Downward Spiral", "Hurt"], "s": [2, 3, 6, 9]},
{"a": "Daft Punk", "t": "Discovery", "y": 2001, "g": "Electronic", "d": "French disco and funk filtered through vocoders and house music production. Thomas Bangalter and Guy-Manuel de Homem-Christo conceived the album alongside Leiji Matsumoto's anime film Interstella 5555. 'One More Time' samples Eddie Johns. 'Digital Love' samples George Duke. 'Harder, Better, Faster, Stronger' was later sampled by Kanye West. Over three million copies sold and incalculable influence on pop, indie, and electronic music for two decades.", "tr": ["One More Time", "Aerodynamic", "Digital Love", "Harder Better Faster Stronger", "Crescendolls", "Superheroes", "Something About Us", "Voyager", "Veridis Quo", "Face to Face", "Too Long"], "s": [0, 2, 3, 6]},
{"a": "Kanye West", "t": "The College Dropout", "y": 2004, "g": "Hip Hop", "d": "After being dismissed as 'just a producer,' West's debut proved he could rap brilliantly. Sped-up soul samples became his signature \u2014 'Through the Wire' was recorded with his jaw literally wired shut after a car accident, and you can hear it in every syllable. 'Jesus Walks' tackled faith in mainstream rap with a gospel choir. West's themes \u2014 education, class, consumerism \u2014 were personal and political simultaneously. Went quadruple platinum and launched the most influential career in 21st-century music.", "tr": ["We Don't Care", "All Falls Down", "Spaceship", "Jesus Walks", "Never Let Me Down", "Slow Jamz", "School Spirit", "Two Words", "Through the Wire", "Family Business", "Last Call"], "s": [1, 3, 8]},
{"a": "Kanye West", "t": "My Beautiful Dark Twisted Fantasy", "y": 2010, "g": "Hip Hop", "d": "After the Taylor Swift VMA incident, West self-exiled to a Hawaiian studio and assembled Kid Cudi, Nicki Minaj, Bon Iver, Rick Ross, Pusha T, and dozens more into hip hop's most ambitious recording. 'Power' samples twelve sources including King Crimson. 'Runaway' builds from a single piano note into a nine-minute epic that ends with Auto-Tuned vocals intentionally degraded into pure texture. George Condo's cover was banned by retailers. Hip hop's maximalist opus \u2014 grandiose, flawed, and absolutely essential.", "tr": ["Dark Fantasy", "Gorgeous", "POWER", "All of the Lights", "Monster", "So Appalled", "Devil in a New Dress", "Runaway", "Blame Game", "Lost in the World"], "s": [2, 3, 6, 7]},
{"a": "Kanye West", "t": "808s & Heartbreak", "y": 2008, "g": "Hip Hop", "d": "After his mother died from cosmetic surgery complications and his engagement to Alexis Phifer ended, West abandoned rap for stark, Auto-Tuned singing over Roland TR-808 drum machine beats. Universally panned on release \u2014 now recognized as the album that invented modern hip hop's emotional register. Without 808s there's no Drake, no Kid Cudi, no Travis Scott, no Juice WRLD. A commercial risk born of genuine grief that changed popular music's direction.", "tr": ["Say You Will", "Welcome to Heartbreak", "Heartless", "Amazing", "Love Lockdown", "Paranoid", "RoboCop", "Street Lights", "Coldest Winter"], "s": [1, 2, 4, 7]},
{"a": "Madvillain", "t": "Madvillainy", "y": 2004, "g": "Hip Hop", "d": "MF DOOM \u2014 the masked rapper named after Marvel's Doctor Doom \u2014 and producer Madlib created underground hip hop's defining statement. Most of the 22 tracks are under two minutes: dense, offbeat, and endlessly rewarding on repeat listens. DOOM's labyrinthine wordplay, with its internal rhymes and misdirections, reveals new meanings with every listen. Madlib drew from the most obscure corners of jazz and film soundtracks. The album that serious rap fans recommend first. DOOM died in 2020.", "tr": ["The Illest Villains", "Accordion", "Meat Grinder", "Bistro", "Raid", "America's Most Blunted", "Money Folder", "Figaro", "Fancy Clown", "All Caps", "Great Day"], "s": [1, 2, 7, 9]},
{"a": "Arcade Fire", "t": "Funeral", "y": 2004, "g": "Indie Rock", "d": "Named for the deaths of multiple band members' relatives during the recording period. The Montreal collective channeled genuine grief into euphoric anthems of startling power \u2014 'Wake Up' became a stadium singalong, 'Rebellion (Lies)' a generation's anthem. David Bowie, David Byrne, and U2 championed them publicly. Recorded in a church and a small loft on tiny Merge Records, it proved that sincerity and ambition could be revolutionary forces in indie rock.", "tr": ["Neighborhood #1 (Tunnels)", "Neighborhood #2 (Laika)", "Une Annee Sans Lumiere", "Neighborhood #3 (Power Out)", "Crown of Love", "Wake Up", "Haiti", "Rebellion (Lies)", "In the Backseat"], "s": [0, 3, 5, 7]},
{"a": "Frank Ocean", "t": "Channel Orange", "y": 2012, "g": "R&B", "d": "His Tumblr post about falling in love with a man preceded the album by days, making its release a cultural event beyond music. 'Pyramids' is a ten-minute epic spanning ancient Egypt and modern strip clubs over a Prince-worthy funk arrangement. 'Thinkin Bout You' became a quiet smash. Won Best Urban Contemporary Album at the Grammys despite the Recording Academy's confusion about how to categorize it. Over a million copies sold.", "tr": ["Thinkin Bout You", "Sierra Leone", "Sweet Life", "Super Rich Kids", "Pilot Jones", "Crack Rock", "Pyramids", "Lost", "Bad Religion", "Pink Matter", "Forrest Gump"], "s": [0, 3, 6, 9]},
{"a": "Frank Ocean", "t": "Blonde", "y": 2016, "g": "R&B", "d": "Ocean fulfilled his Def Jam contract with the visual album Endless, then independently released Blonde the very next day \u2014 an extraordinary power play. Contributions from Pharrell, Radiohead's Jonny Greenwood, James Blake, and Beyonc\u00e9 appear in fragments. The beat switch in 'Nights' became one of modern music's most analyzed moments. 'Self Control' is devastating. Debuted at number one with zero singles, no interviews, no radio play \u2014 just the music and its reputation.", "tr": ["Nikes", "Ivy", "Pink + White", "Solo", "Skyline To", "Self Control", "Nights", "Solo (Reprise)", "White Ferrari", "Seigfried", "Godspeed", "Futura Free"], "s": [1, 2, 5, 6]},
{"a": "Kendrick Lamar", "t": "good kid m.A.A.d city", "y": 2012, "g": "Hip Hop", "d": "A Compton coming-of-age story structured as a concept album, with skits framed as voicemails from Kendrick's concerned parents. Dr. Dre executive-produced. 'Backseat Freestyle' and 'Swimming Pools' became anthems, but 'm.A.A.d city' told a harrowing story of violence and survival. 'Sing About Me, I'm Dying of Thirst' is twelve minutes of the most ambitious storytelling in hip hop. Debuted at number two and has been certified triple platinum.", "tr": ["Sherane", "Bitch Don't Kill My Vibe", "Backseat Freestyle", "The Art of Peer Pressure", "Money Trees", "Poetic Justice", "good kid", "m.A.A.d city", "Swimming Pools", "Sing About Me", "Compton"], "s": [2, 4, 8, 9]},
{"a": "Kendrick Lamar", "t": "To Pimp a Butterfly", "y": 2015, "g": "Hip Hop", "d": "Two years in the making with Thundercat, Kamasi Washington, and Terrace Martin providing a live jazz-funk foundation. A spoken-word poem weaves through all sixteen tracks, revealed on the finale as an imagined conversation with Tupac Shakur. 'Alright' became the anthem of the Black Lives Matter movement. Kendrick later won the Pulitzer Prize for Music \u2014 the first non-classical, non-jazz artist to receive the honor. A landmark of 21st-century American art.", "tr": ["Wesley's Theory", "For Free?", "King Kunta", "These Walls", "u", "Alright", "Momma", "Hood Politics", "How Much a Dollar Cost", "The Blacker the Berry", "i", "Mortal Man"], "s": [2, 5, 8, 9]},
{"a": "Tyler, the Creator", "t": "IGOR", "y": 2019, "g": "Neo Soul / Synth Pop", "d": "A radical synth-soul departure from everything Tyler had done before. He played nearly every instrument, created all visual elements, and refused to release singles. 'NEW MAGIC WAND' was inspired by No Doubt's 'Don't Speak.' Won Best Rap Album at the Grammys \u2014 Tyler challenged the category in his acceptance speech, noting his work was always put in the rap category regardless of genre. Debuted at number one, beating DJ Khaled, who publicly complained about it.", "tr": ["IGOR'S THEME", "EARFQUAKE", "I THINK", "RUNNING OUT OF TIME", "NEW MAGIC WAND", "A BOY IS A GUN", "PUPPET", "GONE GONE / THANK YOU", "I DON'T LOVE YOU ANYMORE", "ARE WE STILL FRIENDS?"], "s": [1, 4, 5, 9]},
{"a": "Tyler, the Creator", "t": "Flower Boy", "y": 2017, "g": "Hip Hop", "d": "The pivotal album in Tyler's evolution from provocateur to sincere artist. Lush neo-soul arrangements \u2014 horns, strings, synths \u2014 replaced the abrasive production of his earlier work. Songs openly explored his sexuality and loneliness for the first time. 'See You Again' with Kali Uchis is warm and vulnerable in ways his fans never expected. 'Garden Shed' is a metaphor for the closet. The album that earned universal critical respect and opened the door to IGOR's radical transformation.", "tr": ["Foreword", "Where This Flower Blooms", "Sometimes", "See You Again", "Who Dat Boy", "Garden Shed", "Boredom", "I Ain't Got Time!", "911 / Mr. Lonely", "November", "Enjoy Right Now Today"], "s": [1, 3, 6, 8]},
{"a": "SZA", "t": "Ctrl", "y": 2017, "g": "R&B", "d": "Nearly walked away from the album entirely after years of delays at Top Dawg Entertainment. Many songs were written in fifteen minutes. The deliberately unpolished quality \u2014 voice cracks left in, ad-libs preserved \u2014 felt revolutionary amid the calculated perfection of mainstream pop. 'Love Galore' with Travis Scott and 'The Weekend' became defining tracks. Triple platinum. The album that defined late-2010s R&B by proving vulnerability could be more compelling than polish.", "tr": ["Supermodel", "Love Galore", "Doves in the Wind", "Drew Barrymore", "Prom", "The Weekend", "Go Gina", "Garden", "Broken Clocks", "20 Something"], "s": [1, 3, 5, 9]},
{"a": "Beyonce", "t": "Lemonade", "y": 2016, "g": "Pop / R&B", "d": "A visual album premiered on HBO with chapters named after the K\u00fcbler-Ross stages of grief. Jay-Z's apparent infidelity was neither confirmed nor denied, turning the album into a cultural event. Musically it spans country, punk, Afrobeats, and industrial R&B. Filmed at plantations, parking garages, and flooded New Orleans rooms. 'Formation' became a political statement about Black Southern identity. Won a Peabody Award \u2014 the first pop album to do so.", "tr": ["Pray You Catch Me", "Hold Up", "Don't Hurt Yourself", "Sorry", "6 Inch", "Daddy Lessons", "Love Drought", "Sandcastles", "Freedom", "All Night", "Formation"], "s": [1, 3, 8, 10]},

{"a": "Tame Impala", "t": "Currents", "y": 2015, "g": "Psychedelic Pop", "d": "Kevin Parker recorded, produced, mixed, and played nearly every instrument at home in Perth, Australia. The shift from psychedelic rock to shimmering synth-pop alienated some early fans and won millions more. 'Let It Happen' took over a year to finish, with its deliberate stuck-CD glitch effect. Parker mixed the track over a hundred times. Over four billion Spotify streams. Transformed Tame Impala from a psych-rock band into one of the world's biggest festival headliners.", "tr": ["Let It Happen", "Nangs", "The Moment", "Yes I'm Changing", "Eventually", "Gossip", "Past Life", "Disciples", "Reality in Motion", "Love/Paranoia", "New Person Same Old Mistakes"], "s": [0, 3, 4, 10]},
{"a": "LCD Soundsystem", "t": "Sound of Silver", "y": 2007, "g": "Electronic", "d": "James Murphy's second album perfected his fusion of punk attitude and dance-floor electronics. 'All My Friends' \u2014 seven minutes of building piano repetition over a driving beat, layering desperate nostalgia about growing older \u2014 is widely considered one of the greatest songs of the 2000s. 'Someone Great' transforms personal grief into shimmering synth-pop. 'New York, I Love You but You're Bringing Me Down' is a bittersweet farewell that became the city's unofficial anthem.", "tr": ["Get Innocuous!", "Time to Get Away", "North American Scum", "Someone Great", "All My Friends", "Us v Them", "Watch the Tapes", "Sound of Silver", "New York I Love You but You're Bringing Me Down"], "s": [3, 4, 8]},
{"a": "Amy Winehouse", "t": "Back to Black", "y": 2006, "g": "Soul", "d": "Winehouse channeled 1960s Motown, Phil Spector's Wall of Sound, and girl-group pop through her own unvarnished tales of addiction and heartbreak. Produced by Mark Ronson and Salaam Remi, the retro production is immaculate \u2014 vintage without being pastiche. 'Rehab' became a darkly ironic anthem when she died of alcohol poisoning in 2011 at twenty-seven. Five Grammy Awards. Over twenty million copies. A singular voice silenced far too soon.", "tr": ["Rehab", "You Know I'm No Good", "Me & Mr Jones", "Just Friends", "Back to Black", "Love Is a Losing Game", "Tears Dry on Their Own", "Wake Up Alone", "He Can Only Hold Her"], "s": [0, 1, 4, 5]},

{"a": "The White Stripes", "t": "Elephant", "y": 2003, "g": "Garage Rock Revival", "d": "Recorded in two weeks at Toe Rag Studios in London using only analogue equipment \u2014 no computers, no digital technology whatsoever. Jack White's guitar and Meg White's deliberately minimalist drumming stripped rock back to its most essential elements. 'Seven Nation Army' became the most ubiquitous guitar riff of the twenty-first century, chanted spontaneously in football stadiums from Milan to Buenos Aires. The riff is so embedded in culture that most people don't even know which band plays it.", "tr": ["Seven Nation Army", "Black Math", "There's No Home for You Here", "I Just Don't Know What to Do with Myself", "In the Cold Cold Night", "Ball and Biscuit", "The Hardest Button to Button"], "s": [0, 3, 5]},
{"a": "Wilco", "t": "Yankee Hotel Foxtrot", "y": 2002, "g": "Alternative Rock", "d": "Reprise Records rejected the finished album and dropped the band. Then Nonesuch Records \u2014 owned by the same parent company \u2014 picked it up. Jeff Tweedy's battle with anxiety and addiction produced his most adventurous work \u2014 glitchy electronics, gorgeous melodies, and raw emotional honesty. The album was streamed for free on Wilco's website months before its official release, making it an early landmark of internet-era music distribution.", "tr": ["I Am Trying to Break Your Heart", "Kamera", "Radio Cure", "War on War", "Jesus Etc.", "Ashes of American Flags", "Heavy Metal Drummer", "Poor Places", "Reservations"], "s": [0, 4, 5]},
{"a": "Fiona Apple", "t": "Fetch the Bolt Cutters", "y": 2020, "g": "Art Rock", "d": "Recorded at her Venice Beach home \u2014 her dogs bark audibly throughout, percussion includes stomped floors and banged walls. First album to receive a perfect 10.0 from Pitchfork in a decade. Apple had been largely reclusive since 2012, and the album arrived like a dispatch from an artist who'd spent eight years sharpening every edge. Each song is percussive, jagged, and profoundly liberating. The title is a quote from the television series The Fall \u2014 a woman freeing herself.", "tr": ["I Want You to Love Me", "Shameika", "Fetch the Bolt Cutters", "Under the Table", "Relay", "Rack of His", "Newspaper", "Ladies", "Heavy Balloon", "On I Go"], "s": [0, 1, 2, 6]},
{"a": "Lorde", "t": "Melodrama", "y": 2017, "g": "Art Pop", "d": "A breakup album by a nineteen-year-old, produced with Jack Antonoff and structured as a single house party \u2014 arriving, drinking, dancing, crying, leaving. 'Green Light' was her most ambitious single, rebuilding pop song structure from scratch. 'Liability' is devastating solo piano. 'Supercut' layers nostalgia over a driving beat. Debuted at number one worldwide. The rare sophomore album that surpassed a legendary debut by going deeper and stranger instead of playing it safe.", "tr": ["Green Light", "Sober", "Homemade Dynamite", "The Louvre", "Liability", "Hard Feelings/Loveless", "Writer in the Dark", "Supercut", "Perfect Places"], "s": [0, 4, 7]},

{"a": "Gorillaz", "t": "Demon Days", "y": 2005, "g": "Alternative / Electronic", "d": "Damon Albarn's virtual band went dark. The cartoon members \u2014 voiced by an extraordinary roster from De La Soul to Dennis Hopper to Shaun Ryder \u2014 inhabited an album about apocalypse and surveillance. 'Feel Good Inc.' married De La Soul's vocals to a hypnotic bass groove and became a global hit. 'DARE' featured Shaun Ryder. Genre boundaries became completely irrelevant when the artistic vision was this strong. Over eight million copies.", "tr": ["Last Living Souls", "Kids with Guns", "O Green World", "Dirty Harry", "Feel Good Inc.", "El Manana", "November Has Come", "White Light", "DARE", "Demon Days"], "s": [2, 4, 8]},
{"a": "Sufjan Stevens", "t": "Illinois", "y": 2005, "g": "Indie Folk", "d": "A twenty-two-track orchestral folk epic that addresses serial killer John Wayne Gacy Jr., Superman, and UFO sightings with equal emotional sincerity. Banjo, oboe, trumpet, electronic drums, and a full choir. 'John Wayne Gacy, Jr.' ends with the chilling realization that Sufjan sees himself in the killer. 'Chicago' builds to one of the decade's most joyful crescendos. 'Casimir Pulaski Day' is devastating grief set to fingerpicked guitar. Staggering ambition matched by genuine emotional depth.", "tr": ["Concerning the UFO Sighting", "The Black Hawk War", "Come On Feel the Illinoise", "John Wayne Gacy Jr.", "Jacksonville", "Decatur", "Chicago", "Casimir Pulaski Day", "The Predatory Wasp", "Out of Egypt"], "s": [3, 6, 7, 8]},
{"a": "The xx", "t": "xx", "y": 2009, "g": "Indie Pop", "d": "Three London teenagers \u2014 average age nineteen \u2014 made minimalist pop from whispered vocals, sparse guitar, and bass, with Jamie xx's production defined by negative space and restraint. Recorded on a budget that wouldn't cover most bands' catering. 'Crystalised' builds its hook from what isn't there. 'Intro' became one of the most licensed tracks in television and advertising. Won the Mercury Prize. Proof that in an age of maximalism, sometimes less is devastatingly more.", "tr": ["Intro", "VCR", "Crystalised", "Islands", "Heart Skipped a Beat", "Fantasy", "Shelter", "Basic Space", "Stars"], "s": [1, 2, 3]},
{"a": "Burial", "t": "Untrue", "y": 2007, "g": "Electronic", "d": "The anonymous South London producer (later revealed as Will Bevan) chopped R&B vocals \u2014 Beyonc\u00e9, Ray J, Christina Aguilera \u2014 into ghostly fragments over crackly two-step garage beats. The album sounds like 3 AM night buses, empty streets, and urban loneliness rendered as music. 'Archangel' is heartbreaking. 'Near Dark' is genuinely unsettling. It reinvented UK electronic music and influenced a generation of producers. Bevan has given almost no interviews and refuses to perform live.", "tr": ["Untitled", "Archangel", "Near Dark", "Ghost Hardware", "Endorphin", "Etched Headplate", "In McDonalds", "Untrue", "Shell of Light", "Dog Shelter", "Raver"], "s": [1, 3, 8]},

{"a": "Rosalia", "t": "El Mal Querer", "y": 2018, "g": "Flamenco Pop", "d": "Catalan artist Rosal\u00eda Vila fused traditional flamenco \u2014 palmas, cante jondo \u2014 with electronic production, Auto-Tune, and urban beats. Conceptually based on a thirteenth-century Occitan romance about an abusive marriage. 'Malamente' layers handclaps over trap bass. 'Di Mi Nombre' is flamenco as futuristic R&B. The album redefined Spanish pop globally, earned two Latin Grammys, and established Rosal\u00eda as one of the most innovative artists in world music.", "tr": ["Malamente", "Que No Salga la Luna", "Pienso en Tu Mira", "De Aqui No Sales", "Reniego", "Di Mi Nombre", "Maldicion", "Bagdad", "A Pale"], "s": [0, 2, 5]},

{"a": "Weyes Blood", "t": "Titanic Rising", "y": 2019, "g": "Art Pop", "d": "Natalie Mering channels Karen Carpenter and Harry Nilsson through songs about climate anxiety, digital isolation, and the impossibility of genuine connection in the modern world. 'Andromeda' and 'Everyday' are among the decade's most gorgeous pop songs \u2014 warm, orchestral, and aching with longing. The underwater bedroom of the cover art captures the album's mood: beauty submerged, threatened, and somehow still radiant. A modern classic of baroque pop.", "tr": ["A Lot's Gonna Change", "Andromeda", "Everyday", "Something to Believe", "Movies", "Mirror Forever", "Wild Time", "Picture Me Better", "Nearer to Thee"], "s": [1, 2, 5]},
{"a": "Mitski", "t": "Puberty 2", "y": 2016, "g": "Indie Rock", "d": "Japanese-American songwriter Mitski Miyawaki's breakthrough \u2014 every song a compressed short story of longing and displacement. 'Your Best American Girl' is an anthemic rejection of assimilation, its climactic guitar explosion arriving like catharsis after minutes of restraint. 'Happy' personifies happiness as a man who visits briefly then leaves. 'I Bet on Losing Dogs' is exactly what it sounds like. Indie rock's emotional core \u2014 raw, smart, and completely unsparing.", "tr": ["Happy", "Dan the Dancer", "Once More to See You", "Fireworks", "Your Best American Girl", "I Bet on Losing Dogs", "My Body's Made of Crushed Little Stars", "A Burning Hill"], "s": [0, 4, 5, 7]},

{"a": "Run the Jewels", "t": "Run the Jewels 2", "y": 2014, "g": "Hip Hop", "d": "Released for free online. El-P's industrial, dystopian production meets Killer Mike's authoritative bark in what became the decade's most ferocious rap album. 'Close Your Eyes (And Count to Fuck)' features Zack de la Rocha's first recorded verse in years. 'Lie, Cheat, Steal' is political rage distilled to pure energy. In an era of introspective, melodic rap, RTJ2 was a blast of righteous fury \u2014 proof that confrontational hip hop could still feel vital and necessary.", "tr": ["Jeopardy", "Oh My Darling Don't Cry", "Blockbuster Night Part 1", "Close Your Eyes", "Lie Cheat Steal", "Early", "Love Again", "Crown", "Angel Duster"], "s": [0, 3, 4]},

{"a": "Comus", "t": "First Utterance", "y": 1971, "g": "Acid Folk", "d": "Pagan acid folk so unhinged it frightened their own record label. Primal screaming, sawing violin, and lyrics about rape and murder in the English countryside \u2014 folk music as genuine horror. Original pressings sell for over a thousand dollars. Opeth's Mikael \u00c5kerfeldt cites it as a key influence. Nothing before or since has sounded anything like it \u2014 genuinely disturbing pastoral psychedelia that defies all genre classification.", "tr": ["Diana", "The Herald", "Drip Drip", "Song to Comus", "The Bite", "Bitten", "The Prisoner"], "s": [0, 3, 4]},
{"a": "Arthur Russell", "t": "World of Echo", "y": 1986, "g": "Avant-Garde", "d": "An Iowa-born cellist who became central to the New York downtown scene \u2014 disco, classical, folk, and avant-garde all at once. This album is just his amplified cello, voice, and effects pedals, creating music that floats between ambient, folk, and pop with no fixed genre. Russell died of AIDS in 1992 at 40, his work scattered across labels and unreleased tapes. Decades of posthumous releases revealed one of American music's most original minds.", "tr": ["Tone Bone Kone", "Soon-to-Soon", "Tower of Meaning", "Let's Go Swimming", "Hiding Your Present from You", "All-Boy All-Girl", "Lucky Cloud", "Being It"], "s": [0, 3, 4]},
{"a": "Stereolab", "t": "Emperor Tomato Ketchup", "y": 1996, "g": "Post Rock / Space Pop", "d": "Anglo-French group led by Tim Gane and Laetitia Sadier. Marxist lyrics sung in French over layers of Moog synthesizer, motorik rhythms, bossa nova, and space-age pop. 'Metronomic Underground' builds a ten-minute groove from a single bass figure. The band existed simultaneously in 1967 and 2067 \u2014 retro-futurist music that made politics sound like a lounge act from a communist utopia. Their most focused and essential album.", "tr": ["Metronomic Underground", "Cybele's Reverie", "Percolator", "Les Yper-Sound", "Spark Plug", "The Noise of Carpet", "Tomorrow Is Already Here", "Emperor Tomato Ketchup"], "s": [0, 1, 3]},
{"a": "Silver Jews", "t": "American Water", "y": 1998, "g": "Indie Rock", "d": "David Berman was a poet who happened to front a band. With Pavement's Stephen Malkmus on guitar, he crafted songs where every line is quotable \u2014 wry, surreal, deeply American observations delivered in a voice that sounds like it just woke up. 'Random Rules' opens with one of indie rock's greatest couplets. Berman struggled with depression and addiction throughout his life and died by suicide in 2019. Funny, sad, wise, and utterly original.", "tr": ["Random Rules", "Smith & Jones Forever", "Night Society", "Federal Dust", "People", "Blue Arrangements", "Honk If You're Lonely", "The Wild Kindness", "Buckingham Rabbit"], "s": [0, 1, 7]},
{"a": "Fishmans", "t": "Long Season", "y": 1996, "g": "Dream Pop / Dub", "d": "A single 35-minute track that builds from delicate dub-pop into an ecstatic, shimmering climax. The Japanese band fused dub reggae, dream pop, and electronica into something entirely their own. Singer Shinji Sato died of a heart condition at 33, just three years later. The album was virtually unknown outside Japan until internet communities elevated it to near-mythical status. Now regularly appears on global greatest-album lists \u2014 a slow-burning masterpiece.", "tr": ["Long Season"], "s": [0]},
{"a": "The Raincoats", "t": "The Raincoats", "y": 1979, "g": "Post-Punk / DIY", "d": "Rudimentary playing skills and boundless creativity. Their deconstruction of the Kinks' 'Lola' turns the song inside out. Kurt Cobain wrote that finding a used copy was one of the greatest experiences of his life \u2014 'I don't know how to explain it, but it just sounds like they could have been given a recording contract by god.' He personally lobbied for its reissue. The most joyfully DIY album of the post-punk era.", "tr": ["No Side to Fall In", "Adventures Close to Home", "Off Duty Trip", "The Void", "Life on the Line", "Fairytale in the Supermarket", "In Love", "Lola"], "s": [0, 5, 6, 7]},
{"a": "Mdou Moctar", "t": "Afrique Victime", "y": 2021, "g": "Tuareg Rock", "d": "Grew up in rural Niger and built his first guitar from found materials. Tuareg desert blues meets Van Halen-level shredding \u2014 Moctar's technique is genuinely astonishing, adapted from the scales and rhythms of his Saharan heritage. The seven-minute title track builds to a psychedelic crescendo. Released on Matador Records, it was hailed as one of the most exciting guitar albums of the decade by critics worldwide.", "tr": ["Chismiten", "Taliat", "Ya Habibti", "Tala Tannam", "Layla", "Afrique Victime", "Asdikte Akal"], "s": [0, 2, 5]},
{"a": "Grouper", "t": "Ruins", "y": 2014, "g": "Ambient / Folk", "d": "Liz Harris spent a month alone in a crumbling house in Aljezur, Portugal, recording with a piano and a four-track. Frogs croak outside. The boundary between music and environment dissolves completely. Songs emerge from and recede into silence. 'Clearing' is four minutes of piano chords and whispered vocals that contain more emotional truth than most double albums. Devastatingly intimate \u2014 the sonic equivalent of reading someone's private journal.", "tr": ["Made of Metal", "Clearing", "Call Across Rooms", "Labyrinth", "Lighthouse", "Holding", "Made of Air"], "s": [0, 2, 3]},
{"a": "Vashti Bunyan", "t": "Just Another Diamond Day", "y": 1970, "g": "Psychedelic Folk", "d": "Bunyan traveled to Scotland by horse-drawn wagon to join a commune, singing delicately beautiful pastoral folk songs along the way. Joe Boyd produced. It sold zero copies and she abandoned music entirely for thirty years. When the album was rediscovered by the internet generation, original pressings were selling for thousands. She returned to music in 2005. A lost masterpiece of the gentlest, most fragile beauty.", "tr": ["Diamond Day", "Glow Worms", "Lily Pond", "Timothy Grub", "Swallow Song", "Rose Hip November", "Come Wind Come Rain", "Rainbow River"], "s": [0, 1, 5, 7]},
{"a": "Young Marble Giants", "t": "Colossal Youth", "y": 1980, "g": "Minimal Post-Punk", "d": "Recorded in four days for 600 pounds. Alison Statton's whispered vocals over a cheap Casio organ, Stuart Moxham's clean guitar, and barely-there bass \u2014 no drums on most tracks. Where punk and post-punk added layers of noise, they stripped everything away. One perfect album, then they vanished. Kurt Cobain was a fan. The blueprint for minimal indie pop, twee, and everything quiet and devastating.", "tr": ["Searching for Mr Right", "Eating Noddemix", "Colossal Youth", "Wind in the Rigging", "Choci Loni", "Salad Days", "Credit in the Straight World", "Include Me Out", "Brand-New-Life", "Final Day"], "s": [2, 6, 9]},
{"a": "Felt", "t": "Forever Breathes the Lonely Word", "y": 1986, "g": "Indie Pop / Chamber Pop", "d": "Lawrence, who used only his first name, had one stated ambition: to make the most beautiful record ever. With Robin Guthrie of the Cocteau Twins producing and a twelve-string Rickenbacker chiming over minimal arrangements, he nearly succeeded. Jangle pop as chamber music \u2014 every note placed with careful attention, every melody designed to shimmer. Felt released ten albums and ten singles in ten years, then disbanded. This is their masterpiece.", "tr": ["Rain of Crystal Spires", "Gather Up Your Wings and Fly", "Down but Not Yet Out", "September Lady", "Grey Streets", "All the People I Like Are Those That Are Dead", "A Wave Crashed on Rocks", "Hours of Darkness"], "s": [0, 3, 5, 6]},
{"a": "Moondog", "t": "Moondog", "y": 1969, "g": "Minimalist / Classical Outsider", "d": "Louis Thomas Hardin \u2014 a blind street musician who stood on Sixth Avenue in Manhattan wearing a Viking helmet and homemade robes. He invented his own instruments and composed counterpoint that predated minimalism by a decade. Charlie Parker used to jam with him. This Columbia Records album brought his music to a wider audience: intricate canons, street percussion, and a visionary musical mind operating entirely outside every establishment.", "tr": ["Theme", "Minisym", "Stamping Ground", "Birds", "Lament I Bird's Lament", "Pigmy Pig", "Organ Round", "Wind River Lullaby"], "s": [2, 4, 6]},
{"a": "Xiu Xiu", "t": "Fabulous Muscles", "y": 2004, "g": "Experimental / Noise Pop", "d": "Jamie Stewart formed Xiu Xiu after his father's suicide, and the band became a vehicle for extreme emotional states expressed through abrasive, confrontational production. Drum machines glitch alongside acoustic guitar. Stewart's voice cracks and screams. 'I Luv the Valley OH!' is somehow both disturbing and catchy. Too honest and too raw for most listeners, but absolutely irreplaceable for those who need music that refuses to look away from pain.", "tr": ["Crank Heart", "I Luv the Valley OH!", "Little Panda McElroy", "Fabulous Muscles", "Bunny Gamer", "Clowne Towne", "Brian the Vampire", "Fast Car"], "s": [0, 1, 3, 7]},
{"a": "The Clientele", "t": "Strange Geometry", "y": 2005, "g": "Chamber Pop / Indie", "d": "Alasdair MacLean's reverb-drenched guitar and gentle English voice evoke memory, suburban landscapes, and the quiet melancholy of ordinary afternoons. The Clientele were never fashionable \u2014 they existed outside every trend \u2014 and that deliberate unfashionability gave their music a timeless quality. Songs emerge like half-remembered dreams. 'Since K Got Over Me' is one of indie pop's most perfect opening tracks. Consistently underrated because consistency isn't exciting to music journalists.", "tr": ["Since K Got Over Me", "Make You Mine", "Losing Haringey", "Step into the Light", "K", "Geometry", "My Own Face Inside the Trees", "Strange Geometry"], "s": [0, 2, 5, 7]},
{"a": "Juana Molina", "t": "Segundo", "y": 2000, "g": "Folktronica", "d": "She was Argentina's most famous comedian \u2014 star of a nationally beloved television show. Then she walked away from everything to make experimental folk music with loop pedals. David Byrne championed her work. The songs layer her voice into hypnotic, polyrhythmic patterns over acoustic guitar and subtle electronics. Each track is a small, perfectly constructed world. A quiet masterpiece of invention that sounds like nothing else in Argentine or international music.", "tr": ["El Desconfiado", "Mantra del Bicho Feo", "El Perro", "Tres Almas", "Rey de Copas", "Guemes", "No Llama", "Quien?"], "s": [0, 2, 3]},
{"a": "Prefab Sprout", "t": "Steve McQueen", "y": 1985, "g": "Sophisti-Pop", "d": "Paddy McAloon's melodic gift has been compared to Brian Wilson and Burt Bacharach \u2014 and those comparisons aren't hyperbolic. Thomas Dolby's production wraps McAloon's sophisticated pop in warm, tasteful arrangements. 'When Love Breaks Down' took three attempts to become a hit but became one of the great pop singles of the 1980s. Enormous in the UK, virtually unknown in America. One of pop music's most permanent oversights \u2014 permanently overdue for global rediscovery.", "tr": ["Faron Young", "Bonny", "Appetite", "When Love Breaks Down", "Goodbye Lucille #1", "Hallelujah", "Moving the River", "Desire As"], "s": [0, 3, 5]},

{"a": "Ween", "t": "The Mollusk", "y": 1997, "g": "Experimental Rock", "d": "A nautical concept album that's simultaneously a pirate shanty, a prog-rock epic, an Ennio Morricone tribute, and a collection of perfect pop songs. Gene and Dean Ween refuse to be categorized \u2014 they can play anything and parody everything while remaining completely sincere. 'Ocean Man' later became a SpongeBob SquarePants meme, introducing the band to a new generation. 'Buckingham Green' is genuinely epic. The album where their humor and musicianship reached perfect equilibrium.", "tr": ["I'm Dancing in the Show Tonight", "The Mollusk", "Polka Dot Tail", "Mutilated Lips", "The Blarney Stone", "The Golden Eel", "Buckingham Green", "Ocean Man", "She Wanted to Leave"], "s": [1, 3, 6, 7]},
{"a": "This Heat", "t": "Deceit", "y": 1981, "g": "Post-Punk / Avant-Garde", "d": "Recorded in a converted cold storage room in Brixton using tape loops, found sounds, and a growing paranoia about nuclear annihilation and media manipulation. 'S.P.Q.R.' deconstructs a history of empires over industrial clatter. The album predicted industrial music, post-rock, and sample-based composition by years. Charles Bullen, Charles Hayward, and Gareth Williams created something that still sounds like the future \u2014 anxious, brilliant, and utterly uncompromising.", "tr": ["Sleep", "Paper Hats", "Triumph", "S.P.Q.R.", "Cenotaph", "Shrinkwrap", "Radio Prague", "Independence", "A New Kind of Water"], "s": [0, 3, 4, 8]},
{"a": "Scientist", "t": "Scientist Rids the World of the Evil Curse of the Vampires", "y": 1981, "g": "Dub", "d": "Prot\u00e9g\u00e9 of King Tubby working with Roots Radics at Channel One Studio in Kingston. Original roots reggae riddims stripped skeletal \u2014 bass and drums echoing through vast chambers of reverb and delay. What Scientist removes is more powerful than what remains. Each mix is a lesson in negative space. Horror-themed titles mask profound philosophy: less is infinitely more.", "tr": ["Vampire", "Plague of Zombies", "The Mummy's Shroud", "Your Teeth in My Neck", "The Voodoo Curse", "Dance of the Vampires", "Night of the Living Dead"], "s": [0, 3, 5]},
{"a": "Adrianne Lenker", "t": "Songs", "y": 2020, "g": "Folk / Intimate", "d": "The Big Thief singer alone in a one-room cabin in western Massachusetts with a four-track recorder. Birdsong and rain bleed through the walls. Fingerpicked guitar and whisper-close vocals of staggering emotional directness \u2014 no effects, no distance, no protection. 'anything' and 'ingydar' are among the most nakedly beautiful folk songs of the decade. The most intimate recording you'll hear \u2014 like being in the room, breathing the same air.", "tr": ["two reverse", "ingydar", "anything", "forwards beckon rebound", "heavy focus", "half return", "come", "zombie girl", "not a lot just forever", "my angel"], "s": [1, 2, 4, 9]},
{"a": "Linda Perhacs", "t": "Parallelograms", "y": 1970, "g": "Psychedelic Folk", "d": "A dental hygienist from Los Angeles who pioneered multi-tracked vocal phasing techniques in her home studio \u2014 layering her voice into cascading, psychedelic textures years before the technology made it easy. Kapp Records released it; nobody bought it. She returned to dentistry for forty-four years. When the internet generation discovered it, original pressings began selling for over two thousand dollars. The title track's vocal experiments remain genuinely innovative decades later.", "tr": ["Chimacum Rain", "Paper Mountain", "Dolphin", "Parallelograms", "Sandy Toes", "Hey Who Really Cares?", "Moons and Cattails", "Morning Colors"], "s": [2, 3, 5]},
{"a": "Deerhunter", "t": "Halcyon Digest", "y": 2010, "g": "Ambient Pop / Noise", "d": "Bradford Cox channeled nostalgia, the fear of forgetting, and the fragility of memory into Deerhunter's most accessible and emotionally resonant album. 'Helicopter' builds from gentle strumming to a soaring, anthemic climax. 'Desire Lines' dissolves into shimmering texture. Lockett Pundt's contributions \u2014 'Desire Lines' and 'Sailing' \u2014 rival Cox's. Recorded with Ben Allen in Atlanta. An album about preserving fading memories that became an indelible memory itself.", "tr": ["Earthquake", "Don't Cry", "Revival", "Sailing", "Memory Boy", "Desire Lines", "Basement Scene", "Helicopter", "He Would Have Laughed"], "s": [1, 2, 5, 7]},
{"a": "Cleaners from Venus", "t": "Midnight Cleaners", "y": 1982, "g": "Lo-Fi Pop", "d": "Martin Newell \u2014 a gardener and poet from Colchester, Essex \u2014 recorded this on a four-track cassette and sold it by mail order. The jangle-pop melodies rival anything the Smiths produced, and the album predates their debut by a year. 'Corridor of Dreams' and 'Only a Shadow' are perfect pop songs trapped in lo-fi amber. The ultimate bedroom recording artifact, proving that great songwriting transcends recording quality. XTC's Andy Partridge was a devoted fan.", "tr": ["Corridor of Dreams", "Only a Shadow", "Wivenhoe Bells", "Songs for a Fading Star", "Night Starvation", "Drowning Butterflies", "Girl on a Swing", "Mercury Girl"], "s": [0, 2, 5, 7]},
{"a": "Brigitte Fontaine", "t": "Comme a la Radio", "y": 1970, "g": "Avant-Garde / Chanson", "d": "A French chanteuse backed by the Art Ensemble of Chicago \u2014 one of free jazz's most important groups. The combination shouldn't work: existentialist spoken word, absurdist cabaret, free jazz improvisation, and Fontaine's theatrical French delivery. But it creates something utterly unprecedented. Nothing before or since sounds like this album. It's simultaneously hilarious and disturbing, warm and alienating. A genuine one-of-a-kind recording from the fringes of French and American avant-garde.", "tr": ["Comme a la Radio", "Tanka I", "L'Ete l'Ete", "Tanka II", "Blanche-Neige", "Il Pleut", "Le Brouillard", "C'est Normal"], "s": [0, 2, 4]},
{"a": "Lena Platonos", "t": "Sun Masks", "y": 1984, "g": "Greek Electronic", "d": "A classical pianist in Athens who turned to synthesizers in the early 1980s, anticipating darkwave and industrial by years. Recorded on minimal equipment in a country with almost no electronic music infrastructure, she created moody, atmospheric compositions that were completely unknown outside Greece until 2010s reissue culture brought them to global attention. A pioneer of women in electronic music whose work deserved an audience it took thirty years to find.", "tr": ["Shadows' Dance", "Sorcerer", "Sun Masks", "Bloody", "Red Alert", "Cats in the Dark", "Witches", "Free Fly"], "s": [0, 2, 6]},
{"a": "Boards of Canada", "t": "Music Has the Right to Children", "y": 1998, "g": "Electronic", "d": "Scottish brothers Marcus Eoin and Michael Sandison. Warped synthesizers, decayed samples from 1970s educational films, and field recordings layered into music that evokes nostalgia for memories that aren't yours \u2014 childhood filtered through damaged videotape. 'Roygbiv' and 'Turquoise Hexagon Sun' are heartbreakingly beautiful. A Warp Records landmark that defined an entire aesthetic of hauntological electronic music.", "tr": ["Wildlife Analysis", "An Eagle in Your Mind", "Telephasic Workshop", "Triangles & Rhombuses", "Sixtyten", "Turquoise Hexagon Sun", "Roygbiv", "Aquarius", "Olson", "Happy Cycling"], "s": [2, 5, 6, 8]},
{"a": "Unwound", "t": "Leaves Turn Inside You", "y": 2001, "g": "Post-Punk", "d": "Double album swansong from the Olympia, Washington trio. Their most ambitious work \u2014 orchestral post-hardcore that weaves noise, beauty, and despair into an exhausting, exhilarating whole. They recorded it and broke up without hearing the final mix. A decade later, critics recognized it as a masterpiece. Kill Rock Stars released their farewell before anyone knew it was goodbye.", "tr": ["We Invent You", "Leaves Turn Inside You", "Look a Ghost", "October All Over", "Demons Sing Love Songs", "Off This Century", "Below the Salt"], "s": [0, 2, 4]},
{"a": "Annette Peacock", "t": "I'm the One", "y": 1972, "g": "Avant-Garde", "d": "One of the first to process her voice through a Moog synthesizer \u2014 years before Laurie Anderson. A jazz vocalist who studied with Paul Bley, her approach was decades ahead. Songs shift between delicate singing and electronically mutated textures anticipating autotune and vocoder pop. Eerie, powerful, astonishingly prescient.", "tr": ["I'm the One", "Pony", "El Cordobes", "Blood", "Gesture Without Plot", "A Vision", "One Way"], "s": [0, 2, 5]},
{"a": "Cate Le Bon", "t": "Reward", "y": 2019, "g": "Art Rock", "d": "Welsh artist recorded in a furniture-making studio in the Lake District \u2014 simultaneously learning to build tables. Detuned pianos, saxophone, off-kilter pop structures. Won Welsh Music Prize. Produced Deerhunter's next album. 'Miami' opens with one of the year's most arresting melodies. Songs feel slightly tilted, viewed through warped glass.", "tr": ["Miami", "Daylight Matters", "Magnificent Gesture", "Home to You", "Sad Nudes", "Meet the Man", "Reward", "Here It Comes Again"], "s": [0, 1, 6]},
{"a": "The Microphones", "t": "The Glow Pt. 2", "y": 2001, "g": "Lo-Fi / Folk", "d": "Phil Elverum in Anacortes, Washington, recording on cheap equipment \u2014 limitations becoming choices. Distorted acoustic guitars erupt into feedback walls, collapse to whispers. Lo-fi recording creating immense emotional scale from tiny means. K Records. 'I Want Wind to Blow' is overwhelming feeling captured in a bedroom. The masterpiece of Pacific Northwest lo-fi.", "tr": ["The Glow", "I Want Wind to Blow", "The Moon", "Headless Horseman", "My Warm Blood", "Map"], "s": [0, 1, 4]},
{"a": "Talk Talk", "t": "Spirit of Eden", "y": 1988, "g": "Post Rock", "d": "Former synth-pop hitmakers who deliberately destroyed their commercial career to make art. Mark Hollis and Tim Friese-Greene assembled dozens of musicians \u2014 string players, oboist, organist \u2014 but used only fragments of their improvisations, editing them into something wholly new. EMI sued them for making an uncommercial album. It essentially invented post-rock a decade before the term existed. A cathedral of sound built from silence, patience, and uncompromising vision.", "tr": ["The Rainbow", "Eden", "Desire", "Inheritance", "I Believe in You", "Wealth"], "s": [0, 1, 4]},
{"a": "Can", "t": "Tago Mago", "y": 1971, "g": "Krautrock", "d": "Japanese busker Damo Suzuki was recruited off the street in Munich to replace Malcolm Mooney. The Cologne-based band recorded hallucinatory jams on two-track tape, then edited them into structured pieces. 'Mushroom' is pure trance music years before the genre existed. 'Halleluwah' grooves for 18 hypnotic minutes. 'Aumgn' is 17 minutes of pure void. Equal parts hypnotic and terrifying \u2014 krautrock's most adventurous and influential album.", "tr": ["Paperhouse", "Mushroom", "Oh Yeah", "Halleluwah", "Aumgn", "Peking O", "Bring Me Coffee or Tea"], "s": [0, 1, 3]},
{"a": "Deerhoof", "t": "The Runners Four", "y": 2005, "g": "Experimental Rock", "d": "San Francisco noise-pop at its most joyful. Satomi Matsuzaki's childlike vocals against Greg Saunier's explosive drumming. Twenty-four tracks spanning noise, pop, prog, folk, punk \u2014 often within one song. Kill Rock Stars. Genre is irrelevant when creative energy is this infectious. The rare experimental band that makes you smile.", "tr": ["Chatterboxes", "Twin Killers", "Wrong Time Capsule", "Scream Team", "Running Thoughts", "Spirit Ditties of No Tone", "You Can See"], "s": [0, 2, 5]},
{"a": "Diamanda Galas", "t": "The Litanies of Satan", "y": 1982, "g": "Avant-Garde", "d": "Three-octave voice as instrument of terror, recorded in an empty London church. Baudelaire's Satanic poetry rendered through shrieks, whispers, guttural growls, and operatic swoops. Part opera, part exorcism. Later dedicated her work to AIDS sufferers. One of the most extreme and genuinely frightening recordings ever made.", "tr": ["The Litanies of Satan", "Wild Women with Steak-Knives"], "s": [0]},
{"a": "Carla Bley", "t": "Escalator Over the Hill", "y": 1971, "g": "Jazz", "d": "Three-disc opera-cantata recorded over three years with Don Cherry, Jack Bruce, Linda Ronstadt, John McLaughlin, and dozens more. Jazz, rock, Indian music, circus marches collide. Paul Haines's libretto about a hotel at world's edge. Self-released on JCOA Records. One of jazz's most ambitious recordings.", "tr": ["Hotel Overture", "Like Animals", "Rawalpindi Blues", "Over Her Head", "Escalator Over the Hill"], "s": [0, 2, 4]},
{"a": "Moor Mother", "t": "Analog Fluids of Sonic Black Holes", "y": 2019, "g": "Experimental Hip Hop", "d": "Camae Ayewa creates noise, poetry, free jazz, and industrial hip hop addressing Black liberation and systemic violence. Don Giovanni Records. Delivery oscillates between spoken word, singing, and raw assault. Not easy listening \u2014 confronting American racism shouldn't be \u2014 but genuinely innovative and profoundly important art.", "tr": ["Repeater", "After Images", "Sound Black", "Analog Fluids", "LA Policia", "Black Flight", "Race Riot"], "s": [0, 2, 5]},
{"a": "Black Midi", "t": "Cavalcade", "y": 2021, "g": "Experimental Rock", "d": "London four-piece of extreme technical ability serving songs about Marlene Dietrich, a diamond miner, and a man named John L. 'John L' shifts time signatures like changing lanes. 'Diamond Stuff' is genuinely tender. No genre \u2014 all genres simultaneously. Rough Trade. Among the most exciting rock bands of the 2020s.", "tr": ["John L", "Marlene Dietrich", "Chondromalacia Patella", "Slow", "Diamond Stuff", "Dethroned", "Hogwash and Balderdash", "Ascending Forth"], "s": [0, 1, 4, 7]},
{"a": "Faust", "t": "Faust IV", "y": 1973, "g": "Krautrock", "d": "German collective's most accessible work. 'Krautrock' sustains a single chord for twelve minutes, daring the listener to either leave or transcend. On Virgin Records somehow. Proto-industrial, proto-ambient, proto-everything. The title is misleading \u2014 it's their third proper album. Named IV because they thought it sounded better.", "tr": ["Krautrock", "The Sad Skinhead", "Jennifer", "Just a Second", "Picnic on a Frozen River", "Giggy Smile", "Lauft...Heisst Das Es Lauft", "It's a Bit of a Pain"], "s": [0, 2, 5]},
{"a": "Hailu Mergia", "t": "Tche Belew", "y": 1977, "g": "Ethiopian Jazz", "d": "Addis Ababa keyboardist playing Farfisa organ, accordion, and clavinet over Ethiopian pentatonic scales. Recorded in the late 1970s and completely forgotten until Awesome Tapes from Africa reissued it decades later. Pure joy \u2014 the kind of music that makes you smile involuntarily. One of Ethiopian jazz's hidden treasures.", "tr": ["Tche Belew", "Yegna Manale", "Endegna New", "Beale Meret", "Tezeta", "Nifas Zelesse"], "s": [0, 1, 4]},
{"a": "Jessica Pratt", "t": "Quiet Signs", "y": 2019, "g": "Folk", "d": "Vocals barely above silence. Fingerpicked nylon guitar recorded to tape in an LA garage. Each song feels like it has always existed \u2014 not written but discovered. Mexican Summer released it. 'Opening Night' sets the tone: whispered, mysterious, and bewitching. Folk music as s\u00e9ance.", "tr": ["Opening Night", "Aeroplane", "This Time Around", "Fare Thee Well", "Here My Love", "Crossing", "As the World Turns", "Poly Blue"], "s": [0, 2, 4]},
{"a": "Susumu Yokota", "t": "Grinning Cat", "y": 2001, "g": "Electronic", "d": "Japanese producer who sampled classical music, ambient recordings, and natural sounds, then reconstructed them into shimmering electronic compositions. Like wandering through a dream version of a museum. Leaf label. Yokota died in 2015, leaving behind a vast catalog of quiet brilliance. This is his most accessible entry point.", "tr": ["Future Tense", "Uchu Ni Muchu", "Saku", "Cat's Eye", "Toecutter", "Hagoromo", "Silk"], "s": [0, 2, 5]},
{"a": "The Caretaker", "t": "An Empty Bliss Beyond This World", "y": 2011, "g": "Ambient", "d": "Leyland Kirby sourced 1920s and 1930s ballroom recordings, then degraded them \u2014 adding crackle, echo, and decay until the music sounds like it's being remembered by a mind losing its grip. A metaphor for dementia made literal through sound. 'All You Are Going to Want to Do Is Get Back There' is simultaneously comforting and terrifying. Later became a viral phenomenon. Kirby subsequently created a six-album series tracking the stages of memory loss. Hauntingly beautiful.", "tr": ["All You Are Going to Want to Do Is Get Back There", "Libet's Delay", "Mental Caverns Without Sunshine", "Moments of Sufficient Lucidity", "The Great Hidden Sea of the Unconscious"], "s": [0, 1, 4]},
{"a": "Alice Coltrane", "t": "Journey in Satchidananda", "y": 1971, "g": "Spiritual Jazz", "d": "John Coltrane's widow and a profound musician in her own right. Harp, tamboura, bass, and Pharoah Sanders's searing saxophone create genuinely transcendent spiritual jazz. Recorded after she adopted the Sanskrit name Turiyasangitananda, the album channels her devotion into music that feels like meditation given form. Largely overlooked for decades, it's now recognized as one of the great spiritual recordings in any genre.", "tr": ["Journey in Satchidananda", "Shiva-Loka", "Stopover Bombay", "Something About John Coltrane", "Isis and Osiris"], "s": [0, 2, 4]},
{"a": "Pere Ubu", "t": "The Modern Dance", "y": 1978, "g": "Post-Punk", "d": "Cleveland art-damage: David Thomas's alien wail over industrial clatter and free-form synth. 'Non-Alignment Pact' is perfect post-punk. Self-released on Hearthan Records. Named after a Picabia painting. Proto-industrial, noise rock, and art-punk all trace lineage here. Where weird rock begins.", "tr": ["Non-Alignment Pact", "The Modern Dance", "Laughing", "Street Waves", "Chinese Radiation", "Life Stinks", "Real World", "Over My Head", "Sentimental Journey", "Humor Me"], "s": [0, 1, 3, 7]},
{"a": "Lizzy Mercier Descloux", "t": "Press Color", "y": 1979, "g": "Post-Punk", "d": "French visual artist in NYC making minimal funk-punk at ZE Records. 'Fire' locks into a hypnotic two-chord groove. Rhythmic precision owing to Fela Kuti and Television equally. Central to the downtown scene \u2014 friends with Patti Smith and Basquiat. Criminally overlooked post-punk.", "tr": ["Fire", "Torso Corso", "Hard-Boiled Babe", "Lady O K'pele", "Rosa Yemen", "Funky Stuff", "Mission Impossible", "Herpes Simplex"], "s": [0, 1, 3]},
{"a": "Lucinda Williams", "t": "Car Wheels on a Gravel Road", "y": 1998, "g": "Alt-Country", "d": "Six years, three producers, two labels. Southern gothic storytelling \u2014 'Drunken Angel' about Blaze Foley, 'Lake Charles' aching nostalgia. Williams's voice \u2014 worn, wise, and fierce \u2014 is a perfect instrument for the stories of the American South. Won Best Contemporary Folk Grammy. Alt-country's finest hour.", "tr": ["Right in Time", "Car Wheels on a Gravel Road", "2 Kool 2 Be 4-Gotten", "Drunken Angel", "Concrete and Barbed Wire", "Lake Charles", "Can't Let Go", "I Lost It", "Metal Firecracker", "Greenville", "Still I Long for Your Kiss", "Joy", "Jackson"], "s": [0, 3, 5]},
{"a": "Slint", "t": "Spiderland", "y": 1991, "g": "Post Rock", "d": "Six songs recorded in four days at River North Studios in Louisville, Kentucky. Whispered vocals erupting into anguished screams over Steve Albini-influenced guitar interplay that alternates between mathematical precision and emotional chaos. 'Good Morning, Captain' builds to one of the most cathartic moments in rock. The band broke up before release. Several members sought psychiatric help afterward. Essentially invented both post-rock and math rock. A genuinely harrowing listen.", "tr": ["Breadcrumb Trail", "Nosferatu Man", "Don Aman", "Washer", "For Dinner...", "Good Morning Captain"], "s": [0, 3, 5]},
{"a": "Os Mutantes", "t": "Os Mutantes", "y": 1968, "g": "Psychedelic Rock", "d": "Brazilian tropic\u00e1lia at its most joyful and anarchic. The S\u00e3o Paulo trio built homemade effects pedals and fused bossa nova, psychedelia, and Hendrix-style guitar into songs of subversive beauty \u2014 all under military dictatorship. 'Bat Macumba' reduces its own title to a single syllable through repetition. Kurt Cobain was a devoted fan. David Byrne's Luaka Bop label reissued it, introducing them to the world outside Brazil.", "tr": ["Panis et Circenses", "A Minha Menina", "O Relojo", "Adeus Maria Fulo", "Baby", "Senhor F", "Bat Macumba", "Le Premier Bonheur du Jour", "Trem Fantasma", "Tempo No Tempo"], "s": [0, 4, 6, 8]},
{"a": "Scott Walker", "t": "Scott 4", "y": 1969, "g": "Art Pop", "d": "The journey from teen idol to existentialist art-song composer is one of pop's strangest trajectories. Lush orchestral arrangements frame lyrics about Ingmar Bergman films, Soviet uprisings, and Camus-influenced philosophy. 'The Old Man's Back Again' was inspired by the Soviet invasion of Czechoslovakia. Commercial suicide at the time, it's now recognized as visionary \u2014 Walker spent his later career making music so experimental it made this sound like easy listening.", "tr": ["The Seventh Seal", "On Your Own Again", "The World's Strongest Man", "Angels of Ashes", "Boy Child", "Hero of the War", "Duchess", "Get Behind Me", "The Old Man's Back Again", "Rhymes of Goodbye"], "s": [0, 1, 4, 8]},
{"a": "Townes Van Zandt", "t": "Live at the Old Quarter", "y": 1977, "g": "Folk", "d": "Recorded at a small Houston club in 1973, released in 1977. Just his voice and acoustic guitar in front of an intimate audience. Songs of devastating beauty and philosophical despair \u2014 'Pancho and Lefty,' later a number-one country hit for Willie Nelson and Merle Haggard, is rendered here in its purest form. 'To Live Is to Fly' is Van Zandt's masterpiece. He died on New Year's Day 1999 at 52. Among the greatest live folk recordings ever made.", "tr": ["Pancho and Lefty", "Mr. Mudd & Mr. Gold", "Don't You Take It Too Bad", "Two Girls", "Kathleen", "If I Needed You", "Brand New Companion", "White Freightliner Blues", "To Live Is to Fly", "Rex's Blues", "Tecumseh Valley"], "s": [0, 4, 5, 10]},
{"a": "Roedelius", "t": "Selbstportrait", "y": 1979, "g": "Ambient", "d": "Cluster co-founder solo. Gentle piano and early electronics \u2014 pastoral ambient before the term existed. German romanticism filtered through synthesizer. Eno was a devoted collaborator. 'Am Rockzipfel' opens with a tenderness that belies its experimental origins. Sky Records released this quiet revolution.", "tr": ["Am Rockzipfel", "Selbstportrait I", "Selbstportrait II", "Selbstportrait III", "Am Rockzipfel II", "Wenn der Sudwind Weht", "Jardin au Fou"], "s": [0, 1, 5]},

{"a": "Chromatics", "t": "Kill for Love", "y": 2012, "g": "Synth Pop", "d": "Portland group channeling Italo-disco, shoegaze, and 80s soundtracks. Ruth Radelet's crystalline vocals over Johnny Jewel's production. Neil Young's 'Into the Black' reimagined as neon synth ballad. Drive soundtrack adjacent \u2014 nocturnal, cinematic, romantically damaged.", "tr": ["Into the Black", "Kill for Love", "Lady", "Back from the Grave", "Birds of Paradise", "Running Up That Hill", "At Your Door", "These Streets Will Never Look the Same"], "s": [0, 1, 5]},
{"a": "Swans", "t": "Soundtracks for the Blind", "y": 1996, "g": "Experimental Rock", "d": "Michael Gira's double album of extremes \u2014 ambient beauty alternating with the most brutal noise rock ever recorded. Some tracks are delicate tape collages; others feel like being hit by a building. The most ambitious work from Swans' original incarnation, assembled from studio recordings, live tapes, and found sounds. Uncompromising to the point of hostility, but within its two-plus hours there are moments of genuine transcendence.", "tr": ["Red Velvet Corridor", "I Was a Prisoner in Your Skull", "Helpless Child", "Live Through Me", "YRP", "The Sound", "Surrogate Drone", "How They Suffer", "Animus"], "s": [0, 2, 3]},

{"a": "Joanna Newsom", "t": "Ys", "y": 2006, "g": "Folk", "d": "Five songs spanning 55 minutes. Newsom's harp playing and extraordinary, divisive voice \u2014 a childlike soprano that some find transcendent and others find unlistenable \u2014 over Van Dyke Parks's lush orchestrations. Lyrics are dense as a Victorian novel, with 'Emily' alone running 12 minutes. Wholly unique in modern music \u2014 there is no other artist who sounds remotely like her, and no album that attempts what Ys achieves.", "tr": ["Emily", "Monkey & Bear", "Sawdust & Diamonds", "Only Skin", "Cosmia"], "s": [0, 2, 3]},

{"a": "Molly Nilsson", "t": "These Things Take Time", "y": 2008, "g": "Synth Pop", "d": "Swedish DIY pop \u2014 drum machine, cheap synth, deadpan vocals about loneliness and quiet rebellion. Self-released everything. Lo-fi synthpop's reigning queen, operating outside every industry structure. Stockholm's best-kept secret proving great pop needs only conviction and a Casio.", "tr": ["These Things Take Time", "Hey Moon", "In Real Life", "Take Me Out Tonight", "1995", "Not Really", "Animals", "Mountain Time"], "s": [0, 1, 3]},

{"a": "Tirzah", "t": "Devotion", "y": 2018, "g": "Electronic", "d": "South London singer with producer Mica Levi. Minimal R&B stripped to emotional essence \u2014 beats reduced to clicks and hums, vocals barely above whisper. 'Gladly' is love expressed as static. Domino Records. One of the most intimate electronic albums ever made, as if the recording equipment could capture feeling itself.", "tr": ["Devotion", "Fine Again", "Do You Know", "Gladly", "Go Now", "Holding On", "Affection", "Basic Need", "Reach", "Says"], "s": [0, 3, 5]},
{"a": "The Notwist", "t": "Neon Golden", "y": 2002, "g": "Indie Electronic", "d": "German band fusing glitchy electronics with indie rock warmth. 'Pilot' perfectly merges Radiohead ambition with lo-fi gentleness. City Slang Records. Beloved in Europe, unknown in America. Proved electronic rock could be emotionally direct as any acoustic ballad.", "tr": ["One with the Freaks", "Pilot", "Solitaire", "Pick Up the Phone", "Neon Golden", "Consequence", "This Room", "Off the Rails", "Trashing Days", "One Step Inside Doesn't Mean You Understand"], "s": [0, 1, 5, 9]},
{"a": "Beverly Glenn-Copeland", "t": "Keyboard Fantasies", "y": 1986, "g": "Electronic / New Age", "d": "A trans Black man recorded alone in rural Ontario with a Roland TR-707 drum machine and DX7 synthesizer. Released on cassette to absolute silence in 1986. Thirty years later, a Japanese record collector discovered it and wrote Glenn-Copeland a letter. The resulting reissue made him famous at 74 \u2014 a lifetime of invisibility transformed into global recognition. The music itself is warm, gentle, and surprisingly contemporary. One of music's great second-act stories.", "tr": ["Ever New", "Keyboard Fantasies", "Let Us Dance", "Color of Anyhow", "Old Melody", "Winter Astral", "Slow Dance"], "s": [0, 1, 3]},

{"a": "Midori Takada", "t": "Through the Looking Glass", "y": 1983, "g": "Minimalist", "d": "Japanese percussionist performing solo on marimba, gongs, and assorted percussion, creating hypnotic minimalist soundscapes that feel both ancient and futuristic. Originally released in 1983 to little notice, it became one of the most sought-after albums in the world when Palto Flats reissued it in 2017. Pressings sold out instantly. 'Mr. Henri Rousseau's Dream' is twenty minutes of slowly evolving marimba patterns that induce a genuinely altered state of consciousness.", "tr": ["Mr. Henri Rousseau's Dream", "Crossing", "Trompe-l'oeil", "Catastrophe"], "s": [0, 1]},

{"a": "Lhasa de Sela", "t": "La Llorona", "y": 1997, "g": "Folk", "d": "American-Mexican singer raised in a traveling show family. Sang in Spanish, French, English. Haunting voice over baroque arrangements. Died of cancer at 37. The title track channels centuries of Latin American grief. Extraordinary beauty from a life lived between cultures and languages.", "tr": ["De Cara a la Pared", "La Celestina", "El Desierto", "Los Peces", "La Llorona", "Pa' Llegar a Tu Lado", "El Pajaro", "De Cara a la Pared (reprise)"], "s": [0, 2, 4]},
{"a": "Low", "t": "I Could Live in Hope", "y": 1994, "g": "Slowcore", "d": "Duluth, Minnesota trio who practically invented slowcore. Painfully slow tempos \u2014 drums reduced to single hits separated by seconds of silence. Alan Sparhawk and Mimi Parker's harmonies achieved a nearly supernatural blend \u2014 they were married, and their voices had merged over years of singing together. Parker died of ovarian cancer in 2022. This debut established the template: minimalism as emotional maximalism.", "tr": ["Words", "Fear", "Cut", "Slide", "Lazy", "Lullaby", "Sea", "Over the Ocean", "Rope", "Sunshine"], "s": [0, 2, 6, 7]},

{"a": "Dean Blunt", "t": "Black Metal", "y": 2014, "g": "Art Pop", "d": "Don't let the title fool you \u2014 this isn't metal of any kind. The enigmatic London artist layers lo-fi R&B, ambient noise, minimal folk, and unidentifiable textures into something that refuses all categorization. Track titles are deliberately misleading. Production is intentionally degraded. Nothing sounds like what you expect. Genuine outsider art from the internet age \u2014 the sound of someone making music for an audience of one, who happened to let others listen.", "tr": ["100", "Lush", "Grade", "Blow", "Hush", "Forever", "Mersh", "Punk", "50 Cent", "Molly & Aquafina", "X"], "s": [0, 1, 5, 8]},

{"a": "Jlin", "t": "Black Origami", "y": 2017, "g": "Electronic", "d": "Gary, Indiana footwork producer creating polyrhythmic drum patterns of staggering complexity. No samples \u2014 all original synthesis. Dance music that's technically impossible to dance to but physically impossible to sit still during. Planet Mu. The sound of rhythm pushed past all known limits.", "tr": ["Black Origami", "Enigma", "Nyakinyua Rise", "Hatshepsut", "Carbon 7", "Nandi", "Challenge (To Be Continued)", "1%", "Holy Child", "Calcination", "Never Created Never Destroyed"], "s": [0, 3, 5, 7]},

{"a": "Lomelda", "t": "Hannah", "y": 2020, "g": "Indie Folk", "d": "Hannah Read from Silsbee, Texas. Quiet, devastating folk-rock about identity and meaning in ordinary life. 'Hannah Sun' transforms her name into an anthem. Double Double Whammy. Music that speaks softly and carries enormous emotional weight, released during the pandemic where its intimate scale felt exactly right.", "tr": ["It's Infinite", "Hannah Sun", "Wonder", "Reach", "Angel", "Hannah", "Stranger Still", "Love Buzz"], "s": [0, 1, 3]},
{"a": "Tim Hecker", "t": "Virgins", "y": 2013, "g": "Ambient", "d": "Canadian composer who records acoustic instruments \u2014 piano, woodwinds, organ \u2014 then digitally destroys them until they dissolve into static, drone, and otherworldly texture. It's beauty through destruction, form through chaos. 'Virginal I' builds shattered piano into something monumental. Released on Kranky Records. Hecker's most emotionally direct work, achieving the rare feat of making abstract electronic music feel deeply, physically moving.", "tr": ["Prism", "Virginal I", "Virginal II", "Radiance", "Black Refraction", "Amps Drugs Harmonium", "Stab Variation", "Live Room", "Incense at Abu Ghraib", "Stigmata I", "Stigmata II"], "s": [0, 3, 6, 8]},
{"a": "Phil Elverum", "t": "A Crow Looked at Me", "y": 2017, "g": "Folk", "d": "Written in the weeks immediately following his wife Genevi\u00e8ve's death from cancer at thirty-five, leaving Elverum alone with their infant daughter. There is no metaphor here, no artistic distance \u2014 'Real Death' opens by stating the fact of death as plainly as possible. Recorded on Genevi\u00e8ve's instruments in the room where she died. It is almost unbearably raw. Not an album you enjoy but one you may need. Among the most honest recordings ever made.", "tr": ["Real Death", "Seaweed", "Swims", "My Chasm", "Emptiness Pt. 2", "Forest Fire", "Soria Moria", "When I Take Out the Garbage at Night", "Crow", "Tintin in Tibet", "Ravens"], "s": [0, 2, 7]},
{"a": "Jenny Hval", "t": "Blood Bitch", "y": 2016, "g": "Art Pop", "d": "Norwegian artist's vampire concept album as feminist metaphor. Art pop, noise, spoken word addressing bodily autonomy. Sacred Bones Records. Equal parts Dario Argento and Simone de Beauvoir. Refuses to separate intellectual from visceral \u2014 music that thinks and bleeds simultaneously.", "tr": ["Ritual Awakening", "Female Vampire", "In the Red", "Period Piece", "Conceptual Romance", "Secret Touch", "Blood Bitch"], "s": [0, 1, 5]},
{"a": "Nicolas Jaar", "t": "Space Is Only Noise", "y": 2011, "g": "Electronic", "d": "Recorded largely in his Brown University dorm room when he was just twenty-one. Minimal techno meets musique concr\u00e8te meets folk singer-songwriter \u2014 Jaar builds tracks from near-silence, layering found sounds, his own murmured vocals, and sparse electronic elements into compositions that reward patient listening. 'Time for Us' is a masterclass in restraint. Released on his own Clown & Sunset label. Completely, thrillingly original.", "tr": ["Etre", "Space Is Only Noise If You Can See", "Colomb", "Too Many Kids Finding Rain in the Dust", "Specters of the Future", "Almost Fell", "Balance Her In Between Your Eyes", "Keep Me There", "Time for Us", "Variations", "Problems with the Sun"], "s": [0, 1, 8]},
