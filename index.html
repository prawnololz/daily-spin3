{"a": "Faye Webster", "t": "Atlanta Millionaires Club", "y": 2019, "g": "Indie Folk", "d": "Atlanta songwriter blending pedal steel guitar with lo-fi R&B production \u2014 a combination that shouldn't work but creates something uniquely wistful. 'Kingston' captures heartbreak through mundane detail \u2014 an unremarkable moment made devastating by the precision of its observation. Her voice is casually beautiful, never straining. Secretly Canadian released it. Gen Z's answer to Joni Mitchell if Joni had grown up in the South with a record collection of rap and country.", "tr": ["Room Temperature", "Come to Atlanta", "Flowers", "Kingston", "Right Side of My Neck", "Jonny", "Hurts Me Too"], "s": [1, 3]},
{"a": "Aldous Harding", "t": "Designer", "y": 2019, "g": "Art Pop", "d": "New Zealand songwriter whose deliberately unsettling folk songs are delivered with an intensity that borders on performance art. The 'Barrel' video features avant-garde choreography that makes her look like she's being controlled by an unseen force. 4AD Records. Her voice shifts between registers like someone changing masks \u2014 each song performed by a different persona. Simultaneously funny and disturbing, accessible and deeply weird.", "tr": ["Fixture Picture", "Designer", "Zoo Eyes", "The Barrel", "Damn", "Weight of the Planets", "Pilot"], "s": [1, 3]},
{"a": "Cortex", "t": "Troupeau Bleu", "y": 1975, "g": "Jazz Funk", "d": "French jazz-funk from 1975 that became one of hip hop's most sampled sources. 'Huit Octobre 1971' has been used by MF DOOM, Tyler the Creator, J Dilla, and dozens of others \u2014 its wistful flute melody and Rhodes piano groove apparently irresistible to beatmakers. Originally released on Disques Esp\u00e9rance to minimal notice. The album is a gentle, beautiful listen on its own terms \u2014 the sampling just proves that great melodies find their audience eventually.", "tr": ["Huit Octobre 1971", "Troupeau Bleu", "L'Enfant Samba", "Chanson d'un Jour d'Hiver", "Mary et Jeff"], "s": [0, 1]},
{"a": "William Basinski", "t": "The Disintegration Loops", "y": 2002, "g": "Ambient", "d": "Basinski was digitizing old tape loops when he noticed the magnetic oxide was literally crumbling off the tape as it played \u2014 the music was destroying itself in real time. He recorded the decay. The process happened to conclude on September 11, 2001, and Basinski filmed the Twin Towers burning from his Brooklyn rooftop as the loops disintegrated. Music as entropy, beauty as loss, time as destruction. One of the most conceptually and emotionally powerful works of the twenty-first century.", "tr": ["dlp 1.1", "dlp 2.1", "dlp 3", "dlp 4", "dlp 5", "dlp 6"], "s": [0, 1]},
{"a": "Grace Jones", "t": "Nightclubbing", "y": 1981, "g": "Synth Pop", "d": "Jamaican-American model turned artist. Sly and Robbie's reggae rhythm section meets cold European synths. 'Pull Up to the Bumper' \u2014 most elegant funk ever made. 'Nightclubbing' co-written with Iggy Pop and Bowie. Androgynous icon who bent every genre to her will. Island Records.", "tr": ["Walking in the Rain", "Pull Up to the Bumper", "Use Me", "Nightclubbing", "Art Groupie", "I've Seen That Face Before", "Demolition Man"], "s": [0, 1, 3]},
{"a": "Mulatu Astatke", "t": "Mulatu of Ethiopia", "y": 1972, "g": "Ethiopian Jazz", "d": "Father of Ethio-jazz. Berklee-educated, blending jazz improvisation, Latin rhythms, and Ethiopian pentatonic scales into something wholly original. 'Yekermo Sew' \u2014 used in Broken Flowers and sampled by Nas \u2014 introduced Ethiopian jazz to global audiences. Finally recognized in his seventies as a visionary.", "tr": ["Yekermo Sew", "Dewel", "Kasalefkut Hulu", "Ebo Lala", "Mascaram Setaba"], "s": [0, 1]},
{"a": "Terry Riley", "t": "A Rainbow in Curved Air", "y": 1969, "g": "Minimalist", "d": "Electric organ and harpsichord overdubbed into cascading repetitions that seem to bend time. Predated Philip Glass and Steve Reich's fame and directly influenced Pete Townshend \u2014 'Baba O'Riley' is named partly after Riley. The B-side, 'Poppy Nogood and the Phantom Band,' is even more hypnotic. Columbia Records. Where minimalism begins.", "tr": ["A Rainbow in Curved Air", "Poppy Nogood and the Phantom Band"], "s": [0]},
{"a": "Carla dal Forno", "t": "You Know What It's Like", "y": 2016, "g": "Minimal / Post-Punk", "d": "Melbourne-born, Berlin-based. Minimal synth, dub production, whispered vocals. Blackest Ever Black label. Lo-fi pop stripped to most essential elements \u2014 each track a sketch that implies more than it states. 'Fast Moving Cars' drifts through reverb like smoke. Intimate post-punk for midnight listening.", "tr": ["Fast Moving Cars", "You Know What It's Like", "DB Rip", "No Trace", "What You Gonna Do Now?", "Dry in the Rain", "Flashlight"], "s": [0, 1]},
{"a": "Geinoh Yamashirogumi", "t": "Akira OST", "y": 1988, "g": "Electronic", "d": "Massive choral collective \u2014 over 300 performers \u2014 created one of cinema's greatest scores. Gamelan, Noh theater, Buddhist chanting, and synthesizers merge into music that matched Katsuhiro Otomo's apocalyptic vision perfectly. 'Kaneda' is iconic. Shoji Yamashiro directed it all. The score that made anime soundtracks a legitimate art form.", "tr": ["Kaneda", "Battle Against Clown", "Winds Over Neo-Tokyo", "Tetsuo", "Shohmyoh", "Exodus from the Underground Fortress"], "s": [0, 3]},
{"a": "Mark Hollis", "t": "Mark Hollis", "y": 1998, "g": "Art Rock", "d": "Talk Talk's frontman sole solo album. Near-silent spaces between acoustic instruments \u2014 clarinet, harmonium, guitar playing so few notes the silence becomes the composition. Then Hollis retired completely from music and public life until his death in 2019. The quietest farewell in rock \u2014 barely a whisper, and devastating.", "tr": ["The Colour of Spring", "Watershed", "Inside Looking Out", "The Gift", "A Life", "Westward Bound", "A New Jerusalem"], "s": [0, 1, 4]},
{"a": "Popol Vuh", "t": "Hosianna Mantra", "y": 1972, "g": "Ambient / Spiritual", "d": "Florian Fricke traded his Moog for acoustic instruments \u2014 piano, oboe, tamboura \u2014 and created one of the most serenely beautiful albums of the 1970s. Djong Yun's Korean soprano voice floats over Fricke's piano like mist over water. Werner Herzog used their music in Aguirre and Nosferatu. Recorded at Bavaria Musikstudios in Munich. Spiritual music that requires no specific faith \u2014 just willingness to be still.", "tr": ["Ah!", "Kyrie", "Hosianna Mantra", "Abschied", "Segnung", "Andacht", "Nicht Hoch im Himmel"], "s": [0, 2, 5]},
{"a": "Cocteau Twins", "t": "Treasure", "y": 1984, "g": "Dream Pop", "d": "Before Heaven or Las Vegas, this was their masterpiece of pure sonic beauty. Elizabeth Fraser's glossolalic vocals \u2014 words dissolving into pure melody \u2014 over Robin Guthrie's shimmering, effects-laden guitar. Every track is named after a different mythological or literary figure. 4AD Records at its peak. Not just dream pop but pop music experienced as a dream \u2014 the melodies are vivid but the meaning remains tantalizingly out of reach.", "tr": ["Ivo", "Lorelei", "Beatrix", "Persephone", "Pandora", "Amelia", "Aloysius", "Cicely", "Otterley", "Donimo"], "s": [0, 1, 4]},
{"a": "Broadcast", "t": "Tender Buttons", "y": 2005, "g": "Electronic", "d": "After the full-band Noise Made by People, Trish Keenan and James Cargill stripped down to a duo and created their most experimental work. Analogue synths replacing guitars, song structures dissolving into texture. 'Corporeal' is eerie pop perfection. Keenan's voice \u2014 always otherworldly \u2014 becomes almost disembodied here. Their most uncompromising album and, in retrospect, a farewell to conventional song form.", "tr": ["I Found the End", "Black Cat", "Corporeal", "Tears in the Typing Pool", "Goodbye Girls", "Michael a Grammar", "Bit 35", "Arc of a Journey", "Minus 3", "America's Boy", "Winter Now"], "s": [0, 2, 5]},
{"a": "Harold Budd", "t": "The Pavilion of Dreams", "y": 1978, "g": "Ambient", "d": "Treated piano reverberating in vast acoustic spaces, produced by Brian Eno at Conny Plank's studio. Budd's approach \u2014 playing as few notes as possible and letting the room do the rest \u2014 prefigured ambient piano as a genre. 'Bismillahi Rrahman Rrahim' opens with single notes decaying into silence. Pastoral and meditative. The album that proved that what you don't play matters more than what you do.", "tr": ["Bismillahi 'Rrahman 'Rrahim", "Two Songs - Let Us Go Into the House of the Lord", "Madrigals of the Rose Angel - The Oak of the Golden Dreams", "Madrigals of the Rose Angel - On Hearing the Dew Slowly Falling", "Juno"], "s": [0, 2]},
{"a": "Jorge Ben", "t": "Africa Brasil", "y": 1976, "g": "MPB / Funk", "d": "Rio de Janeiro's greatest musical chameleon fused samba with funk, creating a groove so infectious that Rod Stewart later borrowed the melody of 'Taj Mahal' for 'Da Ya Think I'm Sexy?' \u2014 settled out of court. The album influenced David Byrne and Paul Simon's explorations of Brazilian music. 'Ponta de Lan\u00e7a Africano' is pure rhythmic joy. Music that makes your body move involuntarily, rooted in African diasporic celebration.", "tr": ["Ponta de Lanca Africano", "Africa Brasil", "Xica da Silva", "Taj Mahal", "O Filosofo", "Hermes Trismegisto Escreveu", "Umbabarauma", "Africa Brasil (Zumbi)"], "s": [0, 3, 6]},
{"a": "Caetano Veloso", "t": "Transa", "y": 1972, "g": "MPB", "d": "Recorded in London during Veloso's exile from Brazil under military dictatorship. Psychedelic, political, and aching with homesickness. 'Triste Bahia' reimagines a baroque-era poem as a longing for his native Salvador. Sung in Portuguese, English, and something in between. Tropic\u00e1lia's genius operating far from home, channeling displacement into beauty. One of Brazilian music's defining albums and a powerful document of artistic exile.", "tr": ["You Don't Know Me", "Nine Out of Ten", "Triste Bahia", "It's a Long Way", "Mora na Filosofia", "Nostalgia", "That Day"], "s": [0, 2, 3]},
{"a": "Donato Dozzy", "t": "K", "y": 2010, "g": "Ambient Techno", "d": "A single seventy-eight minute piece of slowly evolving minimal techno \u2014 the same elements cycling with microscopic variations until time itself seems to dissolve. Italian producer Andrea Dozzy created the ultimate meditation on repetition. Released on Further Records. Perfect music for four in the morning when the boundary between consciousness and sleep becomes porous. Patience is the only requirement; the reward is genuinely altered perception.", "tr": ["K"], "s": [0]},
{"a": "Daphne Oram", "t": "Oramics", "y": 1962, "g": "Electronic", "d": "Co-founder of the BBC Radiophonic Workshop who invented the Oramics machine \u2014 an instrument that converted hand-drawn patterns on 35mm film strips into electronic sound. She left the BBC to pursue her own research, spending decades in a converted oast house in Kent. This collection captures her pioneering work in electronic composition, decades before synthesizers were commercially available. Posthumously celebrated as a foundational figure in electronic music.", "tr": ["Pompidou Centre", "Pulse Persephone", "Four Aspects", "Rotolock", "Purring Prisms", "Bird of Parallax", "Tumblerack", "Helicopter"], "s": [0, 1, 5]},
{"a": "Huerco S", "t": "For Those of You Who Have Never", "y": 2016, "g": "Ambient Dub", "d": "Brian Leeds submerged his ambient dub techno in murky, waterlogged production \u2014 like hearing music through deep water or across a vast distance. Released on his own Proibito Records. 'A Sea of Love' opens with warmth that gradually recedes into haze. One of the decade's great ambient statements, proving that lo-fi production values can create emotional depth that pristine recording cannot.", "tr": ["A Sea of Love", "Promises of Fertility", "On the Embankment", "Lifeblood", "Heard Her Breathing", "A Cloud of Dust", "For Those of You Who Have Never"], "s": [0, 2, 5]},
{"a": "Grizzly Bear", "t": "Veckatimest", "y": 2009, "g": "Indie Rock", "d": "Brooklyn quartet's breakthrough. Four songwriters contributing equally, creating a dense, orchestral indie rock where folk, psychedelia, and pop coexist. 'Two Weeks' features a falsetto hook that became a surprise hit. 'While You Wait for the Others' has the grandeur of a symphony compressed into four minutes. Recorded with Chris Taylor's intricate production at various studios. Warp Records released it. One of the decade's great collaborative albums.", "tr": ["Southern Point", "Two Weeks", "All We Ask", "Fine for Now", "Ready Able", "Dory", "I Live with You", "About Face", "Hold Still", "While You Wait for the Others", "Foreground", "Cheerleader"], "s": [0, 1, 4, 9]},
{"a": "Bent Knee", "t": "Land Animal", "y": 2017, "g": "Art Rock", "d": "Boston sextet making art-rock that's genuinely unpredictable \u2014 songs veer between electronic pop, prog complexity, and noise without warning. Courtney Swain's versatile voice navigates every turn. 'Land Animal' addresses racism. 'Bone Rage' is controlled fury. A band that defies easy comparison \u2014 imagine Bjork fronting King Crimson with a sense of humor.", "tr": ["Thank You for Hurting Me", "Land Animal", "Bone Rage", "Hold Me In", "Way Too Long", "Catch Light", "The Well", "Free Me", "Pray"], "s": [0, 1, 2]},
{"a": "Dorothy Ashby", "t": "Afro-Harping", "y": 1968, "g": "Jazz", "d": "The greatest jazz harpist who ever lived, fighting both the instrument's classical associations and the music industry's racism and sexism. This Cadet Records album fuses her virtuosic harp with Afro-Cuban rhythms and soul-jazz grooves. 'Soul Vibrations' has been sampled by dozens of hip hop producers. Ashby died in 1986 at just 53, her genius largely unrecognized until sampling culture brought her music to new ears.", "tr": ["Afro-Harping", "Soul Vibrations", "Life Has Its Trials", "Little Sunflower", "Come Live with Me", "The Look of Love", "Action Line", "Games"], "s": [0, 1, 3]},
{"a": "Eiko Ishibashi", "t": "Drive My Car OST", "y": 2021, "g": "Ambient / Film Score", "d": "Soundtrack to Ryusuke Hamaguchi's Oscar-winning Murakami adaptation. Ishibashi's compositions \u2014 piano, electronics, and barely-there vocals \u2014 capture the film's themes of grief, communication, and the impossibility of truly knowing another person. Music that breathes with the narrative rather than scoring it. Each piece is complete on its own yet gains immeasurable weight in context. Quietly devastating.", "tr": ["Drive My Car", "We'll Live Through the Long Long Days", "Oto", "Misaki", "Night Bus", "Intrusion", "Prayer"], "s": [0, 2, 4]},
{"a": "Arca", "t": "Arca", "y": 2017, "g": "Electronic", "d": "Venezuelan producer Alejandra Ghersi's self-titled album \u2014 a pivot from the abrasive deconstructed club of her earlier work toward something operatic and vulnerable. Her own voice, previously hidden behind processing, emerges as the central instrument. 'Piel' is Spanish for skin. 'Reverie' is genuinely beautiful. The album documents a gender transition in real time through sound. XL Recordings. Bold, personal, and unlike anything in electronic music.", "tr": ["Saunter", "Anoche", "Piel", "Desafio", "Urchin", "Reverie", "Whip", "Sin Rumbo", "Fugaces", "Coraje", "Madre"], "s": [0, 2, 5]},
{"a": "Susanna", "t": "Garden of Earthly Delights", "y": 2019, "g": "Art Pop", "d": "Norwegian singer who reimagines songs by Dolly Parton, Leonard Cohen, and Joy Division as otherworldly chamber music. 'Mountaineers' transforms a Parton original into something suspended between beauty and unease. Her voice possesses devastating purity \u2014 trained but never clinical. Each cover becomes a completely new composition. SusannaSonata Records. The art of interpretation as genuine creation.", "tr": ["Mountaineers", "Hole in the Ground", "Skeleton Key", "Lizard Girl", "Jewels of the Sun", "Garden of Earthly Delights"], "s": [0, 2, 5]},
{"a": "Keiji Haino", "t": "Watashi Dake?", "y": 1981, "g": "Noise / Avant-Garde", "d": "Japanese noise legend's debut solo album \u2014 solo guitar and voice creating music of terrifying intensity. Haino's approach to guitar ranges from delicate fingerpicking to sustained walls of feedback that seem to physically alter the room. His vocals channel Buddhist chanting, blues wailing, and something entirely his own. PSF Records. Not for the faint-hearted, but for those ready to confront the extremes of musical expression.", "tr": ["Watashi Dake?", "Kono Yami No Fukasa", "Ame", "Watashi Wa Anata", "Kono Kuni"], "s": [0, 1]},
{"a": "Lucrecia Dalt", "t": "No Era Solida", "y": 2020, "g": "Electronic", "d": "Colombian artist exploring identity dissolution through processed voice, minimal electronics, and uncanny atmospheres. Songs feel like transmissions from an alternate dimension where language is breaking down. RVNG Intl. 'Tar' layers her whispered Spanish vocals over alien percussion. The album title translates as 'She Was Not Solid' \u2014 a perfect description of music that refuses to solidify into familiar shapes.", "tr": ["No Era Solida", "Tar", "Endiendo", "Soy Mi Propia Trampa", "Disuelta", "Mares de Azar", "Miel"], "s": [0, 1, 4]},
{"a": "Ebo Taylor", "t": "Ebo Taylor", "y": 1977, "g": "Afrobeat / Highlife", "d": "Ghanaian guitarist and bandleader who studied at Eric Guildhall in London before returning to create some of West Africa's most sophisticated music. Highlife, funk, and afrobeat merge in intricate guitar patterns and horn arrangements. Largely unknown outside Ghana until Mr Bongo Records reissued his catalog in the 2000s. 'Love and Death' is a master class in Afro-funk groove. One of West Africa's great unsung musical heroes.", "tr": ["Love and Death", "Come Along", "Aboa Kyiri", "Ene Nyame A Mensuro", "Mumude", "Heaven"], "s": [0, 1, 3]},
{"a": "Mary Lattimore", "t": "Hundreds of Days", "y": 2018, "g": "Ambient / Harp", "d": "Harpist who processes her instrument through effects pedals \u2014 delay, reverb, looping \u2014 creating ambient soundscapes that are simultaneously ancient and futuristic. The harp's natural resonance becomes something oceanic and immersive. Ghostly International released it. 'It Feels Like Floating' does exactly what the title promises. Lattimore proves that a single instrument, thoughtfully processed, can contain entire worlds.", "tr": ["It Feels Like Floating", "Never Saw Him Again", "Hundreds of Days", "On the Day You Saw the Dead Whale", "Baltic Birch", "Hello from the Edge of the Earth"], "s": [0, 2, 4]},
{"a": "Yves Tumor", "t": "Heaven to a Tortured Mind", "y": 2020, "g": "Art Rock", "d": "Sean Bowie's most accessible album transplants Prince's flamboyant sexuality into a noise-rock context. 'Gospel for a New Century' opens with wailing guitar that wouldn't be out of place on a Hendrix album. 'Kerosene!' is a genuine pop song. Warp Records. The album proved that experimental music could be genuinely sexy \u2014 glamorous, confident, and thrilling in ways that most indie rock forgot how to be.", "tr": ["Gospel for a New Century", "Medicine Burn", "Identity Trade", "Kerosene!", "Super Stars", "Romanticist", "Dream Palette", "Folie Imposee", "Asteroid Blues", "A Greater Love"], "s": [0, 3, 5]},
{"a": "Makaya McCraven", "t": "Universal Beings", "y": 2018, "g": "Jazz", "d": "Chicago drummer and producer who recorded improvisational sessions in four cities \u2014 Chicago, New York, London, and Los Angeles \u2014 then cut and reassembled the tapes into seamless compositions. The result sits between live jazz and electronic production without belonging fully to either. International Anthem Recording Company. Jeff Parker, Brandee Younger, and Shabaka Hutchings contribute. Jazz for the 21st century \u2014 alive to hip hop, electronic music, and global rhythms.", "tr": ["Atlantique", "Young Genius", "Atlantic Black", "Mantra", "The Count Off", "Universal Beings", "Prosperity's Fear", "Flipped Out", "The Encore"], "s": [0, 2, 5]},
{"a": "Sarah Davachi", "t": "All My Circles Run", "y": 2017, "g": "Ambient / Drone", "d": "Canadian composer working with pipe organ, synthesizers, and acoustic instruments to create music of slowly evolving harmonic richness. Each piece builds from sustained tones that gradually reveal overtones and subtle movement. Students of Descartes label. Her academic training in electronic music and medieval composition produces work that feels timeless \u2014 neither old nor new. Music for deep listening that rewards patience with genuine revelation.", "tr": ["First Cadence", "Evensong", "Gloaming", "Third Cadence", "For Voice"], "s": [0, 1, 3]},
{"a": "Pan Sonic", "t": "A", "y": 1995, "g": "Electronic", "d": "Finnish duo Mika Vainio and Ilpo V\u00e4is\u00e4nen creating minimal electronic music from pure sine waves, sub-bass frequencies, and industrial noise. The album's physical impact is remarkable \u2014 some frequencies can only be felt, not heard. Vainio died in 2017. Blast First released it. A radical proposition: that electronic music's power lies not in melody or rhythm but in the raw physicality of sound itself. Wear headphones. Turn it up.", "tr": ["Kuuma", "Kaivos", "Koneisto", "Alku", "Vaihe", "Elain", "Aani"], "s": [0, 2, 4]},
{"a": "Mdou Moctar", "t": "Niger EP Vol. 1", "y": 2008, "g": "Tuareg Rock", "d": "Before Afrique Victime, Moctar was trading music on memory cards and phones across the Sahel. These early recordings \u2014 raw, distorted, recorded on cheap equipment in the desert \u2014 capture the pure essence of his Tuareg guitar style before Western production values smoothed it. Sahel Sounds released it. The sound of musical genius in its rawest form, unmediated by studios or industry.", "tr": ["Tahoultine", "Issikhar", "Chet Boghassa", "Imajighen", "Niger"], "s": [0, 1]},
{"a": "Sun Ra", "t": "Lanquidity", "y": 1978, "g": "Jazz", "d": "Sun Ra's most accessible album \u2014 a late-night session at Variety Recording Studios in New York that captured his Arkestra in a rare mellow mood. Funk, modal jazz, and cosmic ambience coexist peacefully. 'Lanquidity' opens with a bass groove that could soundtrack a blaxploitation film before drifting into Saturn's orbit. Philly Jazz Records. Proof that the most far-out jazz musician of the 20th century could also create music of irresistible warmth.", "tr": ["Lanquidity", "Where Pathways Meet", "That's How I Feel", "Twin Stars of Thence", "There Are Other Worlds (They Have Not Told You Of)"], "s": [0, 2, 4]},
{"a": "Julianna Barwick", "t": "The Magic Place", "y": 2011, "g": "Ambient", "d": "Barwick alone with a loop pedal, layering her voice into vast choral clouds that fill every available space. No lyrics, no words \u2014 just vowel sounds building into something that feels like entering a cathedral made entirely of human voice. Asthmatic Kitty Records. 'The Magic Place' creates its title's promise: a space of genuine wonder assembled from the simplest possible materials. Among the most beautiful ambient albums of the decade.", "tr": ["Envelop", "Keep Up the Good Work", "The Magic Place", "White Flag", "Cloak", "Prizewinning", "Vow"], "s": [0, 2, 5]},
{"a": "Shabaka Hutchings", "t": "Perceive Its Beauty, Acknowledge Its Grace", "y": 2024, "g": "Spiritual Jazz", "d": "Former Sons of Kemet and Comet Is Coming leader's solo debut replaces the saxophone with shakuhachi (Japanese bamboo flute), kora, and electronics. Meditative, spacious, and deeply spiritual. Impulse! Records. A radical departure from his earlier aggressive playing \u2014 trading energy for stillness, proving that the most powerful musical statement can be the quietest one.", "tr": ["As the Planets and the Stars Collapse", "Body to Inhabit", "Moment of Submergence", "A Prayer", "Breathing", "Kiss of Light"], "s": [0, 2, 4]},
{"a": "Grouper", "t": "A I A: Dream Loss", "y": 2011, "g": "Ambient / Folk", "d": "Liz Harris's most submerged recording \u2014 voice and guitar buried so deep in reverb and processing they become pure texture. Songs exist at the threshold of audibility. The title stands for 'As If Already' and the companion disc Alien Observer was released simultaneously. Yellowelectric Records. Music that asks you to lean in closer and closer until you realize the silence around it is part of the composition.", "tr": ["Dragging the Streets", "Come Softly", "Alien Observer", "Vapor Trails", "She Loves Me That Way", "Living Room", "Wind Return"], "s": [0, 2]},
{"a": "Maria Bethania", "t": "A Beira e o Mar", "y": 1984, "g": "MPB", "d": "The dramatic queen of Brazilian music in full command. Lush arrangements frame her extraordinary voice \u2014 she doesn't sing songs so much as inhabit them, bringing the full weight of her theatrical training to every phrase. Her interpretations of bossa nova and samba transcend genre into pure emotional communication. Caetano Veloso's sister, Gilberto Gil's contemporary \u2014 Brazilian musical royalty.", "tr": ["Eu e a Brisa", "Reconvexo", "Brincar de Viver", "Ponto de Luz", "A Beira e o Mar"], "s": [0, 1, 3]},
{"a": "Kukangendai", "t": "Palm", "y": 2014, "g": "Noise Rock", "d": "Japanese power trio making extreme noise rock with mathematical precision. Guitar, bass, drums \u2014 no effects, no overdubs \u2014 creating music of pulverizing intensity that's somehow also tightly composed. Imagine Lightning Bolt with conservatory training. Released on their own label. Among the most exciting live bands on Earth.", "tr": ["Nami", "Palm", "Tsugu", "Ikou", "Zenbu"], "s": [0, 1]},
{"a": "Loren Connors", "t": "Unaccompanied Acoustic Guitar Improvisations, Vol. 9", "y": 1997, "g": "Ambient Guitar", "d": "Self-taught New Haven guitarist whose trembling, spare improvisations on acoustic guitar channel the blues through minimalist abstraction. Each note hangs in space, surrounded by silence. Influenced by Blind Willie Johnson and Mark Rothko equally. Connors has Parkinson's disease; the tremor in his hands became inseparable from his aesthetic. Music of devastating fragility.", "tr": ["Improvisation 1", "Improvisation 2", "Improvisation 3", "Improvisation 4", "Improvisation 5"], "s": [0, 2]},
{"a": "Nico", "t": "The Marble Index", "y": 1968, "g": "Art Rock", "d": "After Velvet Underground, Nico's solo debut for Elektra Records. John Cale's harmonium drones beneath her deep, Germanic voice singing songs of extraordinary bleakness. No bass, no drums. 'Frozen Warnings' and 'Lawns of Dawns' are Gothic folk decades before goth existed. The album terrified her label. Iggy Pop called her the most beautiful woman he'd ever seen. This is the sound of that beauty turned inward and frozen.", "tr": ["Prelude", "Lawns of Dawns", "No One Is There", "Ari's Song", "Facing the Wind", "Julius Caesar", "Frozen Warnings", "Evening of Light"], "s": [0, 1, 6]},
{"a": "Haruomi Hosono", "t": "Hosono House", "y": 1973, "g": "Folk Rock", "d": "Before Yellow Magic Orchestra conquered the world with electronic pop, Hosono recorded this at his home \u2014 Japanese Americana filtering country, folk, and R&B through a Tokyo sensibility. Japan's most influential musician, here at his most intimate. The production has a warmth that comes from recording in your own living room. A private album that became a national treasure.", "tr": ["Rock-a-Bye My Baby", "Bara to Yajuu", "Fuyu Goe", "Boku wa Chotto", "Tropical Dandy", "Hosono House", "Choo Choo Gatagoto", "Ai Ai Gasa"], "s": [0, 1, 5]},
{"a": "Okkyung Lee", "t": "Ghil", "y": 2013, "g": "Avant-Garde", "d": "Korean cellist in New York performing solo \u2014 her instrument processed and extended into noise, drone, and devastating intensity. Recorded live at Issue Project Room in Brooklyn. The boundary between acoustic instrument and electronic manipulation dissolves entirely. Physical and confrontational music from a classically trained musician who found that tradition's boundaries too confining.", "tr": ["Ghil Part 1", "Ghil Part 2", "Ghil Part 3", "Ghil Part 4"], "s": [0, 2]},
{"a": "Abul Mogard", "t": "Works", "y": 2014, "g": "Ambient", "d": "A retired Serbian factory worker who began making ambient music with synthesizers in his Belgrade apartment, channeling the rhythms of industrial machinery he'd spent decades operating into dense, slowly evolving drones. The sounds of labor transformed into meditation. His biography is possibly fictional \u2014 nobody is sure. Real or mythological, the music is extraordinary: warm, patient, and genuinely transporting.", "tr": ["Slate-Coloured Storm", "Above All Dreams", "Circular Forms", "Works"], "s": [0, 1, 3]},
{"a": "Claire Rousay", "t": "A Softer Focus", "y": 2021, "g": "Ambient", "d": "San Antonio sound artist layering field recordings, whispered vocals, and delicate electronics into compositions that document the texture of daily life. Phone notifications, distant traffic, breathing, and confession merge into something unexpectedly moving. American Dreams Records. The most personal ambient music being made today \u2014 diaristic sound art that proves the mundane is profound.", "tr": ["It Was Always Worth It", "Diluted Dreams", "Discrete (The Market)", "A Softer Focus", "Peak Chroma"], "s": [0, 1, 3]},
{"a": "Don Cherry", "t": "Brown Rice", "y": 1975, "g": "Spiritual Jazz", "d": "Ornette Coleman's trumpet partner went global \u2014 tabla, tamboura, synthesizer, and African percussion creating a spiritual jazz that draws on every tradition simultaneously. The title track rides a hypnotic groove for twenty minutes. A&M Records, improbably. Cherry lived as a nomad, absorbing music from every culture. This album is the sound of someone who saw no boundaries between musical traditions because he'd lived inside all of them.", "tr": ["Brown Rice", "Malkauns", "Chenrezig", "Degi-Degi"], "s": [0, 1]},
{"a": "The Space Lady", "t": "The Space Lady's Greatest Hits", "y": 2013, "g": "Outsider Pop", "d": "Susan Dietrich Schneider busked San Francisco streets for years with a Casio keyboard, cheap effects unit, and homemade costumes. Her covers of 'Major Tom,' 'Born to Be Wild,' and 'Ghost Riders in the Sky' are transformed through complete sincerity into something genuinely transcendent. Night School Records compiled decades of street performances. Outsider art that transcends the label through pure, unironic commitment.", "tr": ["Synthesize Me", "Ghost Riders in the Sky", "Born to Be Wild", "Major Tom", "Ballroom Blitz", "Humdinger", "Radar Love", "I Had Too Much to Dream Last Night"], "s": [0, 1, 3]},
{"a": "Colleen", "t": "The Golden Morning Breaks", "y": 2005, "g": "Folktronica", "d": "C\u00e9cile Schott sampled music box, cello, and guitar then looped and processed them into delicate electronic folk. Leaf label. French artist making music of impossible gentleness and intricacy \u2014 each piece assembled from tiny acoustic fragments that somehow breathe and live as organic compositions. 'Everyone Alive Wants Answers' builds a cathedral from a single plucked string.", "tr": ["The Golden Morning Breaks", "I'll Read You a Story", "Your Heart Is So Loud", "Everyone Alive Wants Answers", "Ritournelle", "One Milky Way", "The Happy Sea", "Summer Water"], "s": [0, 2, 4]}

// ═══════ PERSISTENCE ═══════
const SK="dailyspin_ratings",SSK="dailyspin_streak";
function loadR(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function saveR(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
function loadStreak(){try{return JSON.parse(localStorage.getItem(SSK))||{count:0,last:null}}catch(e){return{count:0,last:null}}}
function saveStreak(s){try{localStorage.setItem(SSK,JSON.stringify(s))}catch(e){}}

// ═══════ HAPTIC ═══════
function haptic(style){
  try{
    if(navigator.vibrate){
      if(style==="light")navigator.vibrate(30);
      else if(style==="medium")navigator.vibrate(50);
      else if(style==="heavy")navigator.vibrate([30,40,30]);
      else if(style==="success")navigator.vibrate([25,50,35]);
      else navigator.vibrate(30);
    }
  }catch(e){}
}


// ═══════ BACKUP / RESTORE ═══════
const BK="dailyspin_backup",BK_META="dailyspin_backup_meta";

// Redundant backup to a second localStorage key on every rating
function autoBackup(){
  try{
    const data=loadR();
    const streak=loadStreak();
    const backup={version:1,saved:new Date().toISOString(),ratings:data,streak:streak};
    localStorage.setItem(BK,JSON.stringify(backup));
    // Track backup metadata
    const meta=JSON.parse(localStorage.getItem(BK_META)||"{}");
    meta.lastAuto=new Date().toISOString();
    meta.count=(meta.count||0)+1;
    meta.totalRatings=Object.keys(data).length;
    // Auto-download every 10 ratings
    if(meta.totalRatings>0&&meta.totalRatings%10===0&&meta.lastDownload!==meta.totalRatings){
      meta.lastDownload=meta.totalRatings;
      localStorage.setItem(BK_META,JSON.stringify(meta));
      downloadBackup(backup);
    } else {
      localStorage.setItem(BK_META,JSON.stringify(meta));
    }
  }catch(e){console.error("Auto-backup failed:",e)}
}

// Try to recover from redundant backup if primary is empty
function tryRecoverBackup(){
  try{
    const primary=loadR();
    if(Object.keys(primary).length>0)return null; // Primary is fine
    const backupStr=localStorage.getItem(BK);
    if(!backupStr)return null;
    const backup=JSON.parse(backupStr);
    if(backup.ratings&&Object.keys(backup.ratings).length>0){
      return backup; // Has recoverable data
    }
    return null;
  }catch(e){return null}
}

function restoreFromAutoBackup(){
  try{
    const backup=JSON.parse(localStorage.getItem(BK));
    if(backup&&backup.ratings){
      saveR(backup.ratings);
      if(backup.streak)saveStreak(backup.streak);
      return{ratings:backup.ratings,count:Object.keys(backup.ratings).length};
    }
    return null;
  }catch(e){return null}
}

function downloadBackup(backupData){
  try{
    const data=backupData||{version:1,exported:new Date().toISOString(),ratings:loadR(),streak:loadStreak()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="dailyspin-backup-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    haptic("success");
    return true;
  }catch(e){console.error("Export failed:",e);return false}
}

function importRatings(file,onComplete){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const backup=JSON.parse(e.target.result);
      if(backup.ratings){
        const existing=loadR();
        const merged={...existing,...backup.ratings};
        saveR(merged);
        if(backup.streak)saveStreak(backup.streak);
        autoBackup(); // Also save to redundant backup

      Sel([{v:"all",l:"All ratings"},{v:"5",l:"\u2605\u2605\u2605\u2605\u2605"},{v:"4",l:"\u2605\u2605\u2605\u2605"},{v:"3",l:"\u2605\u2605\u2605"},{v:"2",l:"\u2605\u2605"},{v:"1",l:"\u2605"},{v:"0",l:"Skipped"}],fr,setFR,"Rating"),
      Sel([{v:"recent",l:"Recent"},{v:"rating",l:"Top rated"},{v:"alpha",l:"A\u2013Z"}],sb,setSB,"Sort")
    ),

    // Album list — NO DELETE, with INTERACTIVE STARS for re-rating
    reRateItem&&h(ReRateModal,{item:reRateItem,onClose:function(){setReRateItem(null)},onSubmit:function(key,newRating){
      if(newRating===0){onReRate(key,-1)}else{onReRate(key,newRating)}
    }}),
    h("div",{style:{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:"0.15em",textTransform:"uppercase",color:"#666",marginBottom:10,display:"flex",justifyContent:"space-between"}},
      h("span",null,items.length+" album"+(items.length!==1?"s":"")),
      h("span",{style:{color:"#777"}},"Tap to re-rate")
    ),
    items.map(function(item){
      return h("div",{key:item.key,style:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#0a0a0a",borderRadius:14,marginBottom:6,border:"1px solid #131313",transition:"all .2s"}},
        h("div",{style:{width:8,height:8,borderRadius:"50%",background:item.type==="classic"?"#1DB954":"#ff6b6b",flexShrink:0,boxShadow:"0 0 6px "+(item.type==="classic"?"#1DB95430":"#ff6b6b30")}}),
        h("div",{style:{flex:1,minWidth:0}},
          h("div",{style:{fontSize:13,color:"#ddd",fontFamily:"'Playfair Display',Georgia,serif",fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},item.title),
          h("div",{style:{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace"}},item.artist)
        ),
        // Interactive stars for re-rating, or skip badge
        item.liked?
          h(TappableStars,{n:item.rating,size:12,onTap:function(){setReRateItem(item)}}):
          h("button",{onClick:function(){haptic("medium");setReRateItem(item)},style:{background:"#ffffff06",border:"1px solid #1a1a1a",borderRadius:8,padding:"4px 10px",fontSize:8,fontFamily:"'DM Mono',monospace",color:"#555",cursor:"pointer",letterSpacing:"0.05em"}},"RE-RATE")
      );
    })
  );
}

// ═══════ MAIN APP ═══════
function App(){
  const[view,setView]=uS("today"),[prevView,setPrevView]=uS("today");
  const[exC,setExC]=uS(false),[exO,setExO]=uS(false);
  const[ratings,setRatings]=uS(loadR);
  const[ratingModal,setRM]=uS(null);
  const[transitioning,setTransitioning]=uS(false);
  const[isSpinning,setSpinning]=uS(false);
  const[streak,setStreak]=uS(loadStreak);

  // Dismiss loader + check for auto-recovery
  const[recoveryBanner,setRecoveryBanner]=uS(null);
  uE(function(){
    var loader=document.getElementById("loader");
    if(loader){setTimeout(function(){loader.classList.add("hide");setTimeout(function(){loader.remove()},500)},300)}
    // Check if primary ratings are empty but backup exists
    var recovery=tryRecoverBackup();
    if(recovery){setRecoveryBanner(recovery)}
  },[]);

  const today=getDay(0),history=Array.from({length:7},function(_,i){return getDay(i)});
  const rageEp=getRageEpisode(0);
  const accent=gc(today.classic.g);

  function submitRating(album,type,data){
    setRatings(function(p){const n={...p};n[aKey(album)]={ts:Date.now(),...data};saveR(n);return n});
    setStreak(updateStreak());
    setTimeout(autoBackup,100); // Auto-backup after every rating
  }
  
  // Re-rate: update existing rating, or re-open modal for skipped items
  function handleReRate(key,newRating){
    if(newRating===-1){
      // Re-rate a skipped item — find the album data and open modal
      const parts=key.split("::");
      const artist=parts[0],title=parts[1];
      // Search both arrays
      var found=null,foundType="classic";
      for(var i=0;i<CLASSICS.length;i++){if(CLASSICS[i].a===artist&&CLASSICS[i].t===title){found=CLASSICS[i];foundType="classic";break}}
      if(!found){for(var j=0;j<OBSCURE.length;j++){if(OBSCURE[j].a===artist&&OBSCURE[j].t===title){found=OBSCURE[j];foundType="obscure";break}}}
      if(found)setRM({album:found,type:foundType});
      return;
    }
    setRatings(function(p){
      const n={...p};
      if(n[key]){n[key].rating=newRating;n[key].liked=true;n[key].ts=Date.now()}
      saveR(n);return n;
    });
    setTimeout(autoBackup,100);
  }

  function switchView(v){
    if(v===view)return;
    haptic("light");setTransitioning(true);
    setTimeout(function(){setPrevView(v);setView(v);setTransitioning(false)},150);
  }
  function handleSpotify(){setSpinning(true);setTimeout(function(){setSpinning(false)},3000)}

  const rc=Object.keys(ratings).length;
  const contentStyle={opacity:transitioning?0:1,transform:transitioning?"translateY(8px)":"translateY(0)",transition:"opacity .15s ease, transform .15s ease"};

  return h("div",{style:{minHeight:"100vh",background:"#050505",color:"#e8e4df",position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"fixed",top:"-40%",right:"-25%",width:"80vw",height:"80vw",borderRadius:"50%",background:"radial-gradient(circle,"+accent+"08 0%,transparent 55%)",pointerEvents:"none",transition:"background 3s ease"}}),
    h("div",{style:{position:"fixed",bottom:"-30%",left:"-15%",width:"60vw",height:"60vw",borderRadius:"50%",background:"radial-gradient(circle,"+gc(today.obscure.g)+"06 0%,transparent 50%)",pointerEvents:"none"}}),
    h("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:100,opacity:0.018,backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E\")"}}),

    ratingModal&&h(RatingModal,{album:ratingModal.album,type:ratingModal.type,onClose:function(){setRM(null)},onSubmit:function(data){submitRating(ratingModal.album,ratingModal.type,data)}}),

    h("div",{style:{maxWidth:580,margin:"0 auto",padding:"28px 18px 120px",position:"relative",zIndex:1}},
      h(Header,{ratingCount:rc,streak:streak,onCollectionClick:function(){switchView("collection")},isSpinning:isSpinning}),
      recoveryBanner&&h("div",{className:"fade-up",style:{background:"#f6a21e10",border:"1px solid #f6a21e25",borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}},
        h("div",null,
          h("div",{style:{fontSize:11,color:"#f6a21e",fontFamily:"'DM Mono',monospace",fontWeight:600,marginBottom:4}},"⚠ Ratings backup found"),
          h("div",{style:{fontSize:10,color:"#999",fontFamily:"'DM Mono',monospace"}},Object.keys(recoveryBanner.ratings).length+" albums from "+new Date(recoveryBanner.saved).toLocaleDateString())
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:function(){var r=restoreFromAutoBackup();if(r){setRatings(loadR());setStreak(loadStreak());setRecoveryBanner(null);haptic("success")}},style:{background:"#f6a21e",color:"#000",border:"none",borderRadius:10,padding:"8px 14px",fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:600,cursor:"pointer"}},"RESTORE"),
          h("button",{onClick:function(){setRecoveryBanner(null)},style:{background:"none",color:"#666",border:"1px solid #333",borderRadius:10,padding:"8px 12px",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer"}},"DISMISS")
        )
      ),
      h("nav",{style:{display:"flex",gap:6,marginBottom:28}},
        [{id:"today",lb:"Today"},{id:"history",lb:"This Week"},{id:"collection",lb:"Collection"}].map(function(t){
          const active=view===t.id;
          return h("button",{key:t.id,onClick:function(){switchView(t.id)},style:{flex:1,background:active?"#fff":"#111",border:active?"none":"1px solid #1e1e1e",padding:"11px 14px",borderRadius:50,fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:active?600:400,letterSpacing:"0.06em",color:active?"#050505":"#777",cursor:"pointer",transition:"all .3s cubic-bezier(.16,1,.3,1)",textTransform:"uppercase",boxShadow:active?"0 4px 20px #ffffff10":"none"}},t.lb);
        })
      ),
      h("div",{style:contentStyle},
        view==="today"&&h("div",{style:{display:"flex",flexDirection:"column",gap:20}},
          h(Card,{album:today.classic,type:"classic",expanded:exC,onToggle:function(){setExC(!exC)},ratingData:ratings[aKey(today.classic)],onRate:function(){setRM({album:today.classic,type:"classic"})},delay:0.08,onSpotifyClick:handleSpotify}),
          h(Card,{album:today.obscure,type:"obscure",expanded:exO,onToggle:function(){setExO(!exO)},ratingData:ratings[aKey(today.obscure)],onRate:function(){setRM({album:today.obscure,type:"obscure"})},delay:0.2,onSpotifyClick:handleSpotify}),
          h(RageCard,{episode:rageEp,delay:0.34})
        ),
        view==="history"&&h("div",{style:{display:"flex",flexDirection:"column",gap:4}},history.map(function(d,i){return h(MiniRow,{key:i,day:d,i:i,ratings:ratings,onRate:function(album,type){setRM({album:album,type:type})}})})),
        view==="collection"&&h(CollectionPage,{ratings:ratings,onReRate:handleReRate,onRefresh:function(){setRatings(loadR());setStreak(loadStreak())}})
      )
    )
  );
}

// ═══════ NOTIFICATIONS ═══════
function scheduleDaily(){
  setInterval(function(){
    var now=new Date(),h2=now.getHours(),m=now.getMinutes(),td=now.toDateString();
    var last=localStorage.getItem("dailyspin_lastnotif");
    if(h2===8&&m===0&&last!==td){localStorage.setItem("dailyspin_lastnotif",td);var day=getDay(0);new Notification("Daily Spin \ud83c\udfa7",{body:day.classic.a+" \u2014 "+day.classic.t+" + "+day.obscure.a+" \u2014 "+day.obscure.t,icon:"icon-192.png",badge:"icon-192.png",tag:"daily-"+td})}
  },60000);
}
if("Notification" in window){
  if(Notification.permission==="granted")scheduleDaily();
  else if(Notification.permission!=="denied")setTimeout(function(){Notification.requestPermission().then(function(p){if(p==="granted")scheduleDaily()})},3000);
}

ReactDOM.render(h(App),document.getElementById("root"));</script>
