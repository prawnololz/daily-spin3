function haptic(style){

      if(style==="light")navigator.vibrate(30);
      else if(style==="medium")navigator.vibrate(50);
      else if(style==="heavy")navigator.vibrate([30,40,30]);

      else navigator.vibrate(30);
    }
  }catch(e){}
}

function CollectionPage({ratings,onRemove}){
  const[fg,setFG]=uS("all"),[fr,setFR]=uS("all"),[ft,setFT]=uS("all"),[sb,setSB]=uS("recent");
  const keys=Object.keys(ratings);
  const genres=[];keys.forEach(function(k){const g=ratings[k].genre;if(genres.indexOf(g)===-1)genres.push(g)});genres.sort();
  let items=keys.map(function(k){return{key:k,...ratings[k]}});
  if(fg!=="all")items=items.filter(function(i){return i.genre===fg});
  if(fr!=="all"){const f=parseInt(fr);if(f===0)items=items.filter(function(i){return!i.liked});else items=items.filter(function(i){return i.liked&&i.rating===f})}
  if(ft!=="all")items=items.filter(function(i){return i.type===ft});
  if(sb==="recent")items.sort(function(a,b){return b.ts-a.ts});
  else if(sb==="rating")items.sort(function(a,b){return(b.liked?b.rating:0)-(a.liked?a.rating:0)});
  else if(sb==="artist")items.sort(function(a,b){return a.artist.localeCompare(b.artist)});
  else if(sb==="year")items.sort(function(a,b){return a.year-b.year});
  const tR=keys.length,tL=keys.filter(function(k){return ratings[k].liked}).length;
  const avg=tL>0?(keys.filter(function(k){return ratings[k].liked}).reduce(function(s,k){return s+ratings[k].rating},0)/tL).toFixed(1):"\u2013";

  function Sel(opts,val,onChange,label){
    return h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{fontSize:8,fontFamily:"'DM Mono',monospace",letterSpacing:"0.15em",color:"#555",marginBottom:4,textTransform:"uppercase"}},label),
      h("select",{value:val,onChange:function(e){haptic("light");onChange(e.target.value)},style:{width:"100%",background:"#0e0e0e",border:"1px solid #222",borderRadius:10,padding:"9px 10px",color:"#ccc",fontSize:12,fontFamily:"'DM Mono',monospace",appearance:"none",WebkitAppearance:"none",cursor:"pointer"}},
        opts.map(function(o){return h("option",{key:o.v,value:o.v},o.l)}))
    );
  }

  return h("div",{className:"fade-up"},
    h("div",{style:{display:"flex",gap:16,justifyContent:"center",marginBottom:24,flexWrap:"wrap"}},
      [{n:tR,l:"Rated"},{n:tL,l:"Liked"},{n:avg,l:"Avg"}].map(function(s){
        return h("div",{key:s.l,style:{textAlign:"center",minWidth:70}},
          h("div",{style:{fontSize:28,fontFamily:"'Playfair Display',Georgia,serif",fontWeight:700,color:"#f5f0eb",lineHeight:1}},s.n),
          h("div",{style:{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:"0.12em",color:"#555",marginTop:3,textTransform:"uppercase"}},s.l));
      })
    ),
    h("div",{style:{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}},
      Sel([{v:"all",l:"All Genres"}].concat(genres.map(function(g){return{v:g,l:g}})),fg,setFG,"Genre"),
      Sel([{v:"all",l:"All Ratings"},{v:"5",l:"\u2605\u2605\u2605\u2605\u2605"},{v:"4",l:"\u2605\u2605\u2605\u2605"},{v:"3",l:"\u2605\u2605\u2605"},{v:"2",l:"\u2605\u2605"},{v:"1",l:"\u2605"},{v:"0",l:"Disliked"}],fr,setFR,"Rating"),
      Sel([{v:"all",l:"All Types"},{v:"classic",l:"Classics"},{v:"obscure",l:"Deep Cuts"}],ft,setFT,"Type"),
      Sel([{v:"recent",l:"Recent"},{v:"rating",l:"Top Rated"},{v:"artist",l:"Artist"},{v:"year",l:"Year"}],sb,setSB,"Sort")
    ),
    h("div",{style:{fontSize:10,fontFamily:"'DM Mono',monospace",color:"#555",marginBottom:14}},items.length+" album"+(items.length!==1?"s":"")),
    items.length===0&&h("div",{style:{textAlign:"center",padding:"50px 20px"}},
      h("div",{style:{fontSize:32,marginBottom:12,opacity:0.15}},"\u266b"),
      h("p",{style:{color:"#444",fontFamily:"'DM Mono',monospace",fontSize:12}},tR===0?"No albums rated yet":"No albums match filters")
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:3}},
      items.map(function(item,i){
        const col2=gc(item.genre),link="https://open.spotify.com/search/"+encodeURIComponent(item.artist+" "+item.title);
        const dt=new Date(item.ts).toLocaleDateString("en-US",{month:"short",day:"numeric"});
        return h("div",{key:item.key,className:"fade-up",style:{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:11,background:"#090909",border:"1px solid #131313",animationDelay:(i*0.02)+"s"}},
          h("div",{style:{width:36,textAlign:"center",flexShrink:0}},
            item.liked?h("div",null,h("div",{style:{fontSize:16,fontWeight:700,color:"#f6a21e",fontFamily:"'DM Mono',monospace",lineHeight:1}},item.rating),h("div",{style:{fontSize:7,color:"#f6a21e88",fontFamily:"'DM Mono',monospace"}},"/5")):h("span",{style:{fontSize:16}},"\ud83d\udc4e")
          ),
          h("a",{href:link,target:"_blank",rel:"noopener noreferrer",onClick:function(){haptic("light")},style:{flex:1,minWidth:0,textDecoration:"none"}},
            h("div",{style:{fontSize:13,color:"#ccc",fontStyle:"italic",fontFamily:"'Playfair Display',Georgia,serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},item.title),
            h("div",{style:{display:"flex",gap:6,alignItems:"center",marginTop:2}},
              h("span",{style:{fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace"}},item.artist),
              h("span",{style:{fontSize:8,color:col2,fontFamily:"'DM Mono',monospace",background:col2+"12",padding:"1px 5px",borderRadius:6}},item.genre)
            )
          ),
          h("span",{style:{fontSize:9,color:"#333",fontFamily:"'DM Mono',monospace",flexShrink:0}},dt),
          h("button",{onClick:function(){haptic("light");onRemove(item.key)},style:{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:14,padding:"4px 6px"}},"\u00d7")
        );
      })
    )
  );
}

        h(Card,{album:today.obscure,type:"obscure",expanded:exO,onToggle:function(){setExO(!exO)},ratingData:ratings[aKey(today.obscure)],onRate:function(){setRM({album:today.obscure,type:"obscure"})},delay:0.26})

// ═══════ NOTIFICATIONS ═══════
function scheduleDaily(){
  setInterval(function(){
    var now=new Date(),h2=now.getHours(),m=now.getMinutes(),today=now.toDateString();
    var last=localStorage.getItem("dailyspin_lastnotif");
    if(h2===8&&m===0&&last!==today){
      localStorage.setItem("dailyspin_lastnotif",today);
      var day=getDay(0);
      new Notification("Daily Spin \ud83c\udfa7",{body:day.classic.a+" \u2014 "+day.classic.t+" + "+day.obscure.a+" \u2014 "+day.obscure.t,icon:"icon-192.png",badge:"icon-192.png",tag:"daily-"+today});
    }
  },60000);
}
if("Notification" in window){
  if(Notification.permission==="granted")scheduleDaily();
  else if(Notification.permission!=="denied")setTimeout(function(){Notification.requestPermission().then(function(p){if(p==="granted")scheduleDaily()})},3000);
}
